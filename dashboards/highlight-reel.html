<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Highlight Reel · Pickle DaaS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap');

:root {
  --bg-deep: #06070b;
  --bg: #0a0c14;
  --surface: #11141e;
  --surface-2: #171c2a;
  --surface-3: #1e2438;
  --border: #242c42;
  --border-subtle: #1a2035;
  --text: #e8ecf4;
  --text-secondary: #a0aac0;
  --muted: #6b7a94;
  --accent: #ff6b35;
  --accent-dim: rgba(255, 107, 53, 0.08);
  --accent-glow: rgba(255, 107, 53, 0.2);
  --gold: #fbbf24;
  --gold-dim: rgba(251, 191, 36, 0.1);
  --green: #00E676;
  --green-dim: rgba(0, 230, 118, 0.08);
  --purple: #7C4DFF;
  --danger: #ef4444;
  --radius: 10px;
  --radius-lg: 14px;
  --shadow: 0 4px 16px rgba(0,0,0,0.4);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.5);
  --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
  background: var(--bg-deep);
  color: var(--text);
  font-size: 14px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* Ambient */
.ambient {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none; z-index: 0;
}
.ambient::before {
  content: '';
  position: absolute; top: -20%; right: -10%;
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(255,107,53,0.04) 0%, transparent 70%);
  animation: drift 20s ease-in-out infinite;
}
@keyframes drift { 0%, 100% { transform: translate(0,0); } 50% { transform: translate(-60px, 40px); } }

.page { position: relative; z-index: 1; }
.shell { max-width: 960px; margin: 0 auto; padding: 0 24px; }

/* Header */
.site-header {
  padding: 24px 0;
  border-bottom: 1px solid var(--border-subtle);
  display: flex; justify-content: space-between; align-items: center;
  flex-wrap: wrap; gap: 12px;
}
.logo-group { display: flex; align-items: center; gap: 12px; }
.logo-mark {
  width: 32px; height: 32px; border-radius: 8px;
  background: linear-gradient(135deg, var(--accent) 0%, rgba(255,107,53,0.4) 100%);
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 14px; color: var(--bg-deep);
  box-shadow: 0 0 16px var(--accent-glow);
}
.logo-text { font-size: 13px; font-weight: 600; }
.logo-text span { color: var(--accent); }
.logo-sub { font-size: 11px; color: var(--muted); font-family: 'JetBrains Mono', monospace; text-transform: uppercase; letter-spacing: 0.5px; }
.back-link { font-size: 12px; color: var(--muted); text-decoration: none; font-family: 'JetBrains Mono', monospace; }
.back-link:hover { color: var(--accent); }

/* Hero */
.hero {
  padding: 48px 0 32px;
  text-align: center;
}
.hero h1 {
  font-size: clamp(28px, 5vw, 46px);
  font-weight: 900;
  letter-spacing: -1.5px;
  line-height: 1.1;
}
.hero h1 em {
  font-style: normal;
  background: linear-gradient(135deg, var(--accent), #FFB74D);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.hero .subtitle {
  font-size: 15px; color: var(--text-secondary);
  margin-top: 10px; max-width: 540px;
  margin-left: auto; margin-right: auto;
}

/* Stats */
.stats-strip {
  display: flex; justify-content: center; gap: 32px;
  padding: 20px 0 32px;
  flex-wrap: wrap;
}
.mini-stat {
  text-align: center;
}
.mini-stat .val {
  font-size: 24px; font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
}
.mini-stat .val.fire { color: var(--accent); }
.mini-stat .val.gold { color: var(--gold); }
.mini-stat .val.green { color: var(--green); }
.mini-stat .lbl {
  font-size: 10px; color: var(--muted);
  text-transform: uppercase; letter-spacing: 1px;
  margin-top: 2px; font-family: 'JetBrains Mono', monospace;
}

/* Clip Card */
.clip-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  margin-bottom: 24px;
  transition: all var(--transition);
}
.clip-card:hover {
  border-color: rgba(255,255,255,0.08);
  box-shadow: var(--shadow-lg);
}
.clip-rank-bar {
  display: flex; align-items: center; gap: 14px;
  padding: 16px 20px;
  background: var(--surface-2);
  border-bottom: 1px solid var(--border-subtle);
}
.rank-number {
  font-size: 28px; font-weight: 900;
  font-family: 'JetBrains Mono', monospace;
  line-height: 1; min-width: 40px;
}
.rank-number.gold { color: var(--gold); }
.rank-number.silver { color: #94a3b8; }
.rank-number.bronze { color: #cd7f32; }
.rank-number.regular { color: var(--muted); }
.clip-title {
  font-size: 15px; font-weight: 600;
  flex: 1;
  line-height: 1.4;
}
.clip-scores {
  display: flex; gap: 12px;
  flex-shrink: 0;
}
.score-pill {
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 11px; font-weight: 600;
  font-family: 'JetBrains Mono', monospace;
  display: flex; align-items: center; gap: 4px;
}
.score-pill.quality { background: var(--green-dim); color: var(--green); border: 1px solid rgba(0,230,118,0.2); }
.score-pill.viral { background: var(--accent-dim); color: var(--accent); border: 1px solid rgba(255,107,53,0.2); }

.video-container {
  position: relative;
  width: 100%;
  aspect-ratio: 16/9;
  background: #000;
  cursor: pointer;
}
.video-container video {
  width: 100%; height: 100%;
  object-fit: contain;
}
.play-big {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 64px; height: 64px;
  border-radius: 50%;
  background: rgba(0,0,0,0.6);
  border: 2px solid rgba(255,255,255,0.3);
  display: flex; align-items: center; justify-content: center;
  transition: all var(--transition);
  pointer-events: none;
}
.play-big::after { content: '▶'; font-size: 22px; color: white; margin-left: 4px; }
.video-container:hover .play-big { background: var(--accent); border-color: var(--accent); transform: translate(-50%, -50%) scale(1.1); }
.video-container.playing .play-big { opacity: 0; }

.clip-details {
  padding: 20px;
  display: grid;
  grid-template-columns: 1fr 200px;
  gap: 20px;
}
.clip-commentary {
  font-size: 14px; color: var(--text-secondary);
  line-height: 1.7;
}
.clip-commentary .label {
  font-size: 10px; color: var(--muted);
  text-transform: uppercase; letter-spacing: 1px;
  font-family: 'JetBrains Mono', monospace;
  margin-bottom: 6px;
  display: flex; align-items: center; gap: 6px;
}
.clip-meta-grid {
  display: flex; flex-direction: column; gap: 8px;
}
.meta-row {
  display: flex; justify-content: space-between;
  padding: 6px 0;
  border-bottom: 1px solid var(--border-subtle);
  font-size: 12px;
}
.meta-row .meta-key { color: var(--muted); }
.meta-row .meta-val { font-weight: 600; font-family: 'JetBrains Mono', monospace; color: var(--text); }
.brand-pills { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
.brand-pill-sm {
  padding: 2px 8px; border-radius: 10px;
  font-size: 10px; font-weight: 500;
  background: var(--surface-3); color: var(--text-secondary);
  border: 1px solid var(--border);
}

/* Footer */
.site-footer {
  margin-top: 48px; padding: 24px 0;
  border-top: 1px solid var(--border-subtle);
  color: var(--muted); font-size: 12px;
  display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px;
}
.site-footer a { color: var(--accent); text-decoration: none; }

/* Loading */
.loading-state {
  display: flex; flex-direction: column; align-items: center;
  padding: 80px 20px; gap: 16px;
}
.spinner {
  width: 36px; height: 36px;
  border: 3px solid var(--border); border-top-color: var(--accent);
  border-radius: 50%; animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Responsive */
@media (max-width: 700px) {
  .clip-details { grid-template-columns: 1fr; }
  .clip-rank-bar { flex-wrap: wrap; }
  .clip-scores { width: 100%; justify-content: flex-start; }
  .stats-strip { gap: 20px; }
}

/* Fade in */
.fade-in { opacity: 0; transform: translateY(10px); animation: fadeIn 0.4s ease forwards; }
@keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<div class="ambient"></div>
<div class="page">
<div class="shell">

<header class="site-header">
  <div class="logo-group">
    <div class="logo-mark">P</div>
    <div>
      <div class="logo-text">Pickle <span>DaaS</span></div>
      <div class="logo-sub">Highlight Reel</div>
    </div>
  </div>
  <a href="showcase-portal.html" class="back-link">← Showcase Portal</a>
</header>

<section class="hero fade-in">
  <h1>The <em>Highlight Reel</em></h1>
  <p class="subtitle">The 10 most electric moments from our AI-analyzed corpus. Ranked by a composite of quality and viral potential.</p>
</section>

<div class="stats-strip fade-in" id="stats-strip"></div>

<div id="loading" class="loading-state">
  <div class="spinner"></div>
  <div style="color: var(--muted); font-size: 13px; font-family: 'JetBrains Mono', monospace;">Curating highlights…</div>
</div>

<div id="clips-container" style="display: none;"></div>

<footer class="site-footer" id="footer" style="display: none;">
  <div>Curated from <span id="total-clips">—</span> clips · <a href="showcase-portal.html">Showcase Portal</a></div>
  <div>Powered by <strong>Pickle DaaS</strong></div>
</footer>

</div>
</div>

<script>
const BRAND_COLORS = {
  'JOOLA': '#00E676', 'NIKE': '#4FC3F7', 'SELKIRK': '#FF7043',
  'CRBN': '#AB47BC', 'FRANKLIN': '#FFD54F', 'ONIX': '#26C6DA',
  'COURTANA': '#7C4DFF', 'RECOVERY CAVE': '#EF5350',
  'THE UNDERGROUND': '#FF9800', 'LIFETIME': '#66BB6A'
};

function normalizeBrand(name) {
  const n = name.trim().toUpperCase();
  const aliases = { 'JOOLA BEN JOHNS': 'JOOLA', 'LIFE TIME PICKLEBALL': 'LIFETIME', 'THE GROUND': 'THE UNDERGROUND' };
  const skip = ['PICKLEBALL', 'SKULL LOGO', 'APPLA'];
  if (skip.includes(n)) return null;
  return aliases[n] || n;
}

function togglePlay(container) {
  const video = container.querySelector('video');
  if (container.classList.contains('playing')) {
    video.pause();
    container.classList.remove('playing');
  } else {
    document.querySelectorAll('.video-container.playing').forEach(c => {
      c.querySelector('video').pause();
      c.classList.remove('playing');
    });
    video.play();
    container.classList.add('playing');
  }
}

(async function() {
  const corpus = await fetch('../corpus-export.json').then(r => r.json()).catch(() => []);

  // Score and rank
  const scored = corpus
    .filter(c => c.quality > 0 && c.viral > 0)
    .map(c => ({ ...c, score: c.quality * c.viral }))
    .sort((a, b) => b.score - a.score)
    .slice(0, 10);

  // Stats
  const avgQ = scored.reduce((s, c) => s + c.quality, 0) / scored.length;
  const avgV = scored.reduce((s, c) => s + c.viral, 0) / scored.length;
  const totalShots = scored.reduce((s, c) => s + (c.total_shots || 0), 0);

  document.getElementById('stats-strip').innerHTML = `
    <div class="mini-stat"><div class="val fire">${scored.length}</div><div class="lbl">Top Clips</div></div>
    <div class="mini-stat"><div class="val gold">${avgQ.toFixed(1)}</div><div class="lbl">Avg Quality</div></div>
    <div class="mini-stat"><div class="val fire">${avgV.toFixed(1)}</div><div class="lbl">Avg Viral</div></div>
    <div class="mini-stat"><div class="val green">${totalShots}</div><div class="lbl">Total Shots</div></div>
  `;

  // Render clips
  const container = document.getElementById('clips-container');

  scored.forEach((clip, i) => {
    const rankClass = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : 'regular';

    const brands = (clip.brands || [])
      .map(b => typeof b === 'string' ? b : (b.name || b.brand_name || ''))
      .map(normalizeBrand)
      .filter(Boolean);

    const brandPills = brands.map(b =>
      `<span class="brand-pill-sm" style="border-color:${BRAND_COLORS[b] || '#64748b'}40; color:${BRAND_COLORS[b] || '#64748b'}">${b}</span>`
    ).join('');

    const commentary = clip.social_caption || clip.coaching || clip.summary || '';
    const commentaryLabel = clip.social_caption ? 'Social Caption' : clip.coaching ? 'Coaching Breakdown' : 'AI Summary';

    const card = document.createElement('div');
    card.className = 'clip-card fade-in';
    card.style.animationDelay = (i * 0.06) + 's';

    card.innerHTML = `
      <div class="clip-rank-bar">
        <div class="rank-number ${rankClass}">#${i + 1}</div>
        <div class="clip-title">${clip.summary || 'Untitled clip'}</div>
        <div class="clip-scores">
          <span class="score-pill quality">Q ${clip.quality}</span>
          <span class="score-pill viral">V ${clip.viral}</span>
        </div>
      </div>
      <div class="video-container" onclick="togglePlay(this)">
        <video src="${clip.video_url}" poster="${clip.thumbnail}" preload="none" loop muted playsinline></video>
        <div class="play-big"></div>
      </div>
      <div class="clip-details">
        <div class="clip-commentary">
          <div class="label">${commentaryLabel}</div>
          ${commentary}
        </div>
        <div class="clip-meta-grid">
          <div class="meta-row"><span class="meta-key">Dominant Shot</span><span class="meta-val">${clip.dominant_shot || '—'}</span></div>
          <div class="meta-row"><span class="meta-key">Total Shots</span><span class="meta-val">${clip.total_shots || '—'}</span></div>
          <div class="meta-row"><span class="meta-key">Story Arc</span><span class="meta-val">${clip.arc || '—'}</span></div>
          <div class="meta-row"><span class="meta-key">Composite</span><span class="meta-val" style="color: var(--accent);">${clip.score}</span></div>
          <div class="meta-row"><span class="meta-key">Play Style</span><span class="meta-val">${clip.play_style || '—'}</span></div>
          ${brands.length ? `<div style="margin-top: 4px;"><div style="font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; font-family: 'JetBrains Mono', monospace; margin-bottom: 4px;">Brands</div><div class="brand-pills">${brandPills}</div></div>` : ''}
        </div>
      </div>
    `;

    container.appendChild(card);
  });

  document.getElementById('loading').style.display = 'none';
  container.style.display = 'block';
  document.getElementById('footer').style.display = 'flex';
  document.getElementById('total-clips').textContent = corpus.length;
})();
</script>
</body>
</html>
