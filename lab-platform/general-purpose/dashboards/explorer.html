<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>General-Purpose Lab · Lab Platform</title>

<style>
:root {
  --bg: oklch(12% .012 240); --sf: oklch(15% .01 240); --sf2: oklch(18% .009 240);
  --sf3: oklch(22% .008 240); --bd: oklch(26% .012 240); --bds: oklch(20% .008 240);
  --tx: oklch(92% .01 240); --tx2: oklch(72% .015 240); --mt: oklch(50% .02 240);
  --ac: #06b6d4; --acd: #06b6d41a; --acg: #06b6d433;
  --pu: oklch(62% .22 300); --pud: oklch(62% .22 300/.08);
  --cy: oklch(72% .18 195); --cyd: oklch(72% .18 195/.08);
  --er: oklch(65% .22 25); --erd: oklch(65% .22 25/.07);
  --wn: oklch(78% .16 85); --wnd: oklch(78% .16 85/.08);
  --r: 10px; --rl: 14px; --ease: cubic-bezier(.22,1,.36,1);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Manrope',system-ui,sans-serif;background:var(--bg);color:var(--tx);font-size:14px;line-height:1.55}
a{color:var(--ac);text-decoration:none}a:hover{text-decoration:underline}

.hdr{padding:20px 24px;border-bottom:1px solid var(--bd);background:var(--sf)}
.hdr-in{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;max-width:1440px;margin:0 auto}
.hdr h1{font-size:26px;font-weight:800;letter-spacing:-.6px}
.hdr h1 .ac{color:var(--ac)}
.lab-id{font-size:10px;color:var(--mt);font-family:'Red Hat Mono',monospace;letter-spacing:1px;text-transform:uppercase}
.chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{padding:3px 10px;border-radius:14px;font-size:10px;font-family:'Red Hat Mono',monospace;letter-spacing:.4px;font-weight:500;border:1px solid var(--bd);background:var(--sf2);color:var(--tx2)}
.chip.ac{background:var(--acd);color:var(--ac);border-color:var(--acg)}
.chip.pu{background:var(--pud);color:var(--pu)}
.chip.cy{background:var(--cyd);color:var(--cy)}
.chip.er{background:var(--erd);color:var(--er)}

.lay{display:grid;grid-template-columns:1fr 1fr 280px;max-width:1440px;margin:0 auto;min-height:calc(100vh - 90px)}
.col{padding:20px;border-right:1px solid var(--bd);overflow-y:auto;max-height:calc(100vh - 90px)}
.col:last-child{border-right:none}
.col-h{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--mt);margin-bottom:14px;display:flex;justify-content:space-between;font-family:'Red Hat Mono',monospace}
.trk{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.4px;padding:6px 0 8px;margin:6px 0 10px;border-bottom:2px solid;font-family:'Red Hat Mono',monospace}
.trk.s{color:var(--pu);border-color:oklch(62% .22 300/.25)}
.trk.d{color:var(--cy);border-color:oklch(72% .18 195/.25)}

.cd{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rl);padding:16px;margin-bottom:10px;cursor:pointer;transition:.25s var(--ease)}
.cd:hover{border-color:oklch(92% .01 240/.12);transform:translateY(-2px)}
.cd.ex{background:var(--sf2);border-color:var(--ac)}
.cd.approved{border-left:3px solid var(--ac)}
.cd.parked{border-left:3px solid var(--wn)}
.cd.dismissed{opacity:.35;border-left:3px solid var(--mt)}
.cd-rk{font-size:24px;font-weight:800;line-height:1;margin-bottom:6px;font-family:'Red Hat Mono',monospace;color:var(--ac)}
.cd.s .cd-rk{color:var(--pu)}.cd.d .cd-rk{color:var(--cy)}
.cd-ti{font-size:14px;font-weight:700;line-height:1.35;margin-bottom:6px;letter-spacing:-.2px}
.cd-ev{font-size:12px;color:var(--tx2);line-height:1.55;margin-bottom:10px}
.cd-mt{display:flex;gap:6px;flex-wrap:wrap;align-items:center;font-size:10px}

.tg{display:inline-block;padding:2px 7px;border-radius:3px;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;font-family:'Red Hat Mono',monospace}
.tg.h{background:var(--acd);color:var(--ac)}
.tg.m{background:var(--wnd);color:var(--wn)}
.tg.l{background:var(--erd);color:var(--er)}
.tg.ag{background:var(--pud);color:var(--pu)}
.tg.ct{background:var(--cyd);color:var(--cy)}

.mr{height:3px;border-radius:2px;background:var(--bd);width:60px;display:inline-block;vertical-align:middle;margin-left:3px;overflow:hidden}
.mr-f{height:100%;transition:width .4s var(--ease)}
.mr-f.g{background:var(--ac)}.mr-f.y{background:var(--wn)}.mr-f.r{background:var(--er)}

.acts{display:flex;gap:5px;margin-top:10px;flex-wrap:wrap}
.bt{padding:5px 12px;border-radius:6px;border:1px solid var(--bd);background:transparent;color:var(--mt);font-size:10px;font-weight:600;cursor:pointer;transition:.2s var(--ease);font-family:'Manrope',sans-serif;text-transform:uppercase;letter-spacing:.5px}
.bt:hover{color:var(--tx);background:var(--sf2)}
.bt.ap{border-color:oklch(78% .19 155/.3);color:oklch(78% .19 155)}
.bt.pk{border-color:oklch(78% .16 85/.3);color:var(--wn)}
.bt.dm{border-color:oklch(40% .02 240/.5);color:var(--mt)}
.bt.dd{border-color:oklch(62% .22 300/.3);color:var(--pu)}

.xb{display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--bds)}
.cd.ex .xb{display:block}
.xs{margin-bottom:10px}
.xs h4{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--mt);margin-bottom:5px;font-family:'Red Hat Mono',monospace}
.xs p{font-size:13px;color:var(--tx2);line-height:1.65}

.ca{background:var(--erd);border:1px solid oklch(65% .22 25/.15);border-radius:8px;padding:10px;margin-top:8px;font-size:12px}
.ca-h{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--er);margin-bottom:3px;font-family:'Red Hat Mono',monospace}

.mm{background:var(--cyd);border:1px solid oklch(72% .18 195/.15);border-radius:8px;padding:10px;margin-top:8px;font-size:12px}
.mm-h{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--cy);margin-bottom:3px;font-family:'Red Hat Mono',monospace}

.flt{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
select{background:var(--sf);color:var(--tx);border:1px solid var(--bd);border-radius:6px;padding:4px 8px;font-size:11px;font-family:'Manrope',sans-serif}

.sb{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rl);padding:12px;margin-bottom:12px}
.sb h3{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--mt);margin-bottom:8px;font-family:'Red Hat Mono',monospace}
.sb .it{display:flex;justify-content:space-between;padding:3px 0;font-size:11px;border-bottom:1px solid oklch(20% .008 240)}
.sb .it:last-child{border-bottom:none}
.sb .lb{color:var(--mt)}.sb .vl{font-family:'Red Hat Mono',monospace;font-weight:500}

@media(max-width:1100px){.lay{grid-template-columns:1fr 1fr}.col:last-child{display:none}}
@media(max-width:700px){.lay{grid-template-columns:1fr;max-height:none}.col{max-height:none;border-right:none;border-bottom:1px solid var(--bd)}}

@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.cd{animation:fadeUp .3s var(--ease) both}
</style>
</head>

<div class="hdr">
  <div class="hdr-in">

      <h1>General-Purpose Lab <span style="font-size:10px;color:var(--mt);vertical-align:super">v4</span></h1>

  </div>
</div>

rketplace (Thesis: Coaches Build Their Own Moat)", "confidence": 0.88, "evidence_summary": "Release anonymized clip datasets + pattern detection as an open API. Coaches use it to build proprietary systems, then pay a rev-share to list their services on a peer-rated marketplace. The corpus becomes the network\u2014each coach adds value (custom annotations), making the dataset more valuable, attracting more coaches.", "business_value": "high", "category": "wildcard_idea", "novelty": 0.9, "recommended_action": "Evaluate as Coaching & Education play", "source_records": [], "raw_data": {"flywheel_score": 0.88, "category": "Coaching & Education"}, "composite_score": 0.5755, "plausibility": 0.75, "plausibility_note": "Marketplace MVP (coach profiles, booking, payment) is standard CRUD; regulatory burden minimal in US.", "track": "strategic", "multi_model_check": {"validation": "partial", "change_mind": "Evidence is conceptual, not validated. Would need: (a) interviews with 5+ coaches showing willingness to pay rev-share for API access vs. building in-house, (b) comparable SaaS coaching tool pricing/adoption, (c) proof that anonymized clips provide sufficient competitive advantage to justify licensing fees. Currently assumes coaches will monetize without showing market demand.", "blind_spot": "Doesn't address coach commoditization risk\u2014once the API is open, coaches' 'moat' erodes as all competitors access the same underlying data. Also ignores switching costs: why wouldn't coaches build their own clip analysis pipeline after learning from the free API? Revenue sustainability unclear."}, "follow_up": {"follow_up_question": "Next step to validate 'Open-Source Coaching Marketplace (Thesis: Coaches '?", "proposed_action": "Evaluate as Coaching & Education play", "assigned_researcher": "wildcard"}, "deep_dive_url": "deep-dives/wildcard-20260415-8712.html"}, {"finding_id": "wildcard-20260415-5706", "agent": "wildcard", "generated_at": "2026-04-15T06:57:34.345694+00:00", "title": "Pickleball Moneyball: Player Draft Exchange", "confidence": 0.92, "evidence_summary": "Turn the corpus into a real-time player valuation engine. Amateur league organizers pay to auto-draft balanced teams using AI skill scores. Each drafted player generates new video uploads (trying to improve their rating), creating a flywheel: more videos \u2192 better models \u2192 more accurate valuations \u2192 more leagues \u2192 more videos.", "business_value": "high", "category": "wildcard_idea", "novelty": 0.9, "recommended_action": "Evaluate as Sports Infrastructure play", "source_records": [], "raw_data": {"flywheel_score": 0.92, "category": "Sports Infrastructure"}, "composite_score": 0.5616, "plausibility": 0.7, "plausibility_note": "Fantasy sports mechanics are well-established; can prototype with PPA player stats in 30 days without licensing.", "track": "strategic", "counterargument": {"argument": "The draft exchange assumes 1968 video clips represent a statistically stable skill distribution across amateur league populations. Amateur league skill spread is far wider and noisier than the corpus; AI scores trained on this sample will not generalize to new player pools or seasons.", "evidence": "Market execution risk: league organizers adopt the system, teams drafted as 'balanced' via AI are actually mismatched. Word spreads that auto-drafts produce worse play experience. Churn and refund liability. The corpus is a convenience sample, not a population census.", "risk_level": "high"}, "multi_model_check": {"validation": "partial", "change_mind": "Stronger evidence than #1 but still thin. Would shift confidence with: (a) pilot with 2-3 amateur leagues showing 30%+ adoption for draft tool, (b) willingness-to-pay study showing organizers pay $100-500/season, (c) comparison to existing fantasy sports pricing models. Assumes amateur league organizers have budget and care about balance; needs validation.", "blind_spot": "Ignores that pickleball leagues may already solve balance manually or via cheap/free alternatives (handicap systems, snake drafts). Also: skill scoring accuracy is critical but untested\u2014wrong valuations destroy trust. Assumes skill metadata is granular enough to predict team chemistry, which video clip data alone may not capture."}, "follow_up": {"follow_up_question": "Next step to validate 'Pickleball Moneyball: Player Draft Exchange'?", "proposed_action": "Evaluate as Sports Infrastructure play", "assigned_researcher": "wildcard"}, "deep_dive_url": "deep-dives/wildcard-20260415-5706.html"}, {"finding_id": "wildcard-20260415-6736", "agent": "wildcard", "generated_at": "2026-04-15T06:57:34.345760+00:00", "title": "Brand Insertion: The Invisible Sponsor Layer", "confidence": 0.78, "evidence_summary": "License shot-pattern metadata to equipment manufacturers. Nike could target ads to viewers who watch high-arc defensive rallies (their string tension). But here's the twist: players get paid micro-bounties to execute branded shot patterns in their games. The corpus becomes a training ground for 'signature moves,' and brands bid on pattern exclusivity.", "business_value": "high", "category": "wildcard_idea", "novelty": 0.9, "recommended_action": "Evaluate as Advertising & Sponsorship play", "source_records": [], "raw_data": {"flywheel_score": 0.78, "category": "Advertising & Sponsorship"}, "composite_score": 0.2857, "plausibility": 0.6, "plausibility_note": "Ad insertion into clips is technically simple; legality/sponsorship negotiation is the blocker, not engineering.", "track": "strategic", "multi_model_check": {"validation": "no", "change_mind": "This is speculative ad-tech layered onto sports footage. Would require: (a) actual Nike/Adidas interest (RFP or LOI), (b) proof that shot-pattern metadata correlates with equipment preferences (e.g., high-arc players actually buy that string tension), (c) IPR/licensing clarity\u2014can you legally monetize player likenesses this way? Currently zero evidence of buyer demand or legal pathway.", "blind_spot": "Major ethical/legal blind spot: players didn't consent to having their 'shot signatures' turned into targeting vectors. Privacy and right-of-publicity risks are unaddressed. Also: attribution is weak\u2014viewing habits \u2260 purchase intent. Equipment sales are driven by brand loyalty and price, not micro-behavioral targeting of amateurs."}, "follow_up": {"follow_up_question": "Next step to validate 'Brand Insertion: The Invisible Sponsor Layer'?", "proposed_action": "Evaluate as Advertising & Sponsorship play", "assigned_researcher": "wildcard"}, "deep_dive_url": "deep-dives/wildcard-20260415-6736.html"}, {"finding_id": "wildcard-20260415-3382", "agent": "wildcard", "generated_at": "2026-04-15T06:57:34.345765+00:00", "title": "Pickleball Trading Cards 2.0: On-Chain Clip Ownership", "confidence": 0.71, "evidence_summary": "Tokenize video clips as NFTs with embedded metadata (skill level, viral score, shot rarity). Players earn tokens for appearing in the corpus; fans trade/collect them. The metadata becomes transparent, trustless, and immutable\u2014creating a secondary market where scarcity is enforced by AI-verified play quality, not artificial scarcity.", "business_value": "high", "category": "wildcard_idea", "novelty": 0.9, "recommended_action": "Evaluate as Web3 & Collectibles play", "source_records": [], "raw_data": {"flywheel_score": 0.71, "category": "Web3 & Collectibles"}, "composite_score": 0.2817, "plausibility": 0.65, "plausibility_note": "NFT/blockchain plumbing is mature; prototype works if you ignore IP licensing issues with clip ownership.", "track": "strategic", "multi_model_check": {"validation": "no", "change_mind": "NFT thesis requires: (a) proof that pickleball clip ownership has liquidity/secondary market demand (not just theoretical), (b) comparable sports NFT projects showing sustained user engagement (most failed post-2022), (c) legal clarity on what 'ownership' means\u2014do players get royalties? Fans resold tokens to whom? Currently riding crypto hype with no differentiation.", "blind_spot": "Assumes players and fans see value in 'owning' clips, but pickleball has no culture of collectibles (unlike basketball cards). Also ignores: custody/wallet friction, tax reporting for micro-earners, and that clip value collapses if the corpus loses cultural relevance. Doesn't address why this is better than simple revenue-share or licensing deals."}, "follow_up": {"follow_up_question": "Next step to validate 'Pickleball Trading Cards 2.0: On-Chain Clip Owners'?", "proposed_action": "Evaluate as Web3 & Collectibles play", "assigned_researcher": "wildcard"}, "deep_dive_url": "deep-dives/wildcard-20260415-3382.html"}, {"finding_id": "wildcard-20260415-2884", "agent": "wildcard", "generated_at": "2026-04-15T06:57:34.345724+00:00", "title": "The Corpus as a Closed-Loop Talent Pipeline", "confidence": 0.89, "evidence_summary": "Partner with pickleball equipment brands to run a 'Skill Bounty' program: players get paid to hit specific shots on camera (arc angles, spin rates, footwork). The corpus becomes a scouting database. Top performers get sponsored or drafted into professional leagues. Brands get authentic user-generated content AND influencers they co-created.", "business_value": "high", "category": "wildcard_idea", "novelty": 0.9, "recommended_action": "Evaluate as Creator Economy & Sponsorship play", "source_records": [], "raw_data": {"flywheel_score": 0.89, "category": "Creator Economy & Sponsorship"}, "composite_score": 0.388, "plausibility": 0.5, "plausibility_note": "Conceptually complex (closed-loop system design); doable as a mockup but not production-ready in 30 days.", "track": "strategic", "counterargument": {"argument": "The 'Skill Bounty' program creates a perverse incentive: players will practice and film artificial shot sequences designed to score well on the AI's metrics, not shots that win games. The corpus becomes self-selecting data of 'optimized-for-measurement' gameplay, not representative pickleball.", "evidence": "Cannibalization of corpus integrity. Once players learn which shots the AI rewards, the dataset shifts from observational pickleball to players gaming the labeling system. Scouting database becomes useless for real talent evaluation. You've created a feedback loop that destroys the asset you're monetizing.", "risk_level": "high"}, "multi_model_check": {"validation": "partial", "change_mind": "Most plausible of the five, but still early. Would strengthen with: (a) LOI from 1-2 equipment brands (Selkirk, Paddletek) showing interest in sponsoring shot challenges, (b) proof that players will perform on-camera for bounties (pilot with 50+ players), (c) cost-per-clip vs. traditional sports sponsorship ROI. The mechanics are sound, but no evidence brands see value.", "blind_spot": "Assumes equipment brands can't just sponsor pickleball tournaments directly (cheaper, broader visibility). Why pay for curated shot clips instead? Also: incentivizing artificial shots ('hit this arc angle') degrades corpus quality\u2014you're no longer capturing authentic play. Selection bias makes downstream AI training worse. May contaminate the entire dataset."}, "follow_up": {"follow_up_question": "Next step to validate 'The Corpus as a Closed-Loop Talent Pipeline'?", "proposed_action": "Evaluate as Creator Economy & Sponsorship play", "assigned_researcher": "wildcard"}, "deep_dive_url": "deep-dives/wildcard-20260415-2884.html"}], "top_data": [{"finding_id": "frequency_analyst-20260415-0739", "agent": "frequency_analyst", "generated_at": "2026-04-15T06:56:56.807037+00:00", "title": "'arc' dominated by 'strategic' (80% of values)", "confidence": 0.85, "evidence_summary": "In field 'arc', the value 'strategic' appears 1577 times out of 1968 total observations (80.1%). Second-place 'grind_rally' at only 4.4%. This dominance may mask other signals.", "business_value": "high", "category": "dominance", "novelty": 0.7, "recommended_ac plausibility": 0.75, "plausibility_note": "Marketplace MVP (coach profiles, booking, payment) is standard CRUD; regulatory burden minimal in US.", "track": "strategic", "multi_model_check": {"validation": "partial", "change_mind": "Evidence is conceptual, not validated. Would need: (a) interviews with 5+ coaches showing willingness to pay rev-share for API access vs. building in-house, (b) comparable SaaS coaching tool pricing/adoption, (c) proof that anonymized clips provide sufficient competitive advantage to justify licensing fees. Currently assumes coaches will monetize without showing market demand.", "blind_spot": "Doesn't address coach commoditization risk\u2014once the API is open, coaches' 'moat' erodes as all competitors access the same underlying data. Also ignores switching costs: why wouldn't coaches build their own clip analysis pipeline after learning from the free API? Revenue sustainability unclear."}, "follow_up": {"follow_up_question": "Next step to validate 'Open-Source Coaching Marketplace (Thesis: Coaches '?", "proposed_action": "Evaluate as Coaching & Education play", "assigned_researcher": "wildcard"}, "deep_dive_url": "deep-dives/wildcard-20260415-8712.html"}, {"finding_id": "wildcard-20260415-5706", "agent": "wildcard", "generated_at": "2026-04-15T06:57:34.345694+00:00", "title": "Pickleball Moneyball: Player Draft Exchange", "confidence": 0.92, "evidence_summary": "Turn the corpus into a real-time player valuation engine. Amateur league organizers pay to auto-draft balanced teams using AI skill scores. Each drafted player generates new video uploads (trying to improve their rating), creating a flywheel: more videos \u2192 better models \u2192 more accurate valuations \u2192 more leagues \u2192 more videos.", "business_value": "high", "category": "wildcard_idea", "novelty": 0.9, "recommended_action": "Evaluate as Sports Infrastructure play", "source_records": [], "raw_data": {"flywheel_score": 0.92, "category": "Sports Infrastructure"}, "composite_score": 0.5616, "plausibility": 0.7, "plausibility_note": "Fantasy sports mechanics are well-established; can prototype with PPA player stats in 30 days without licensing.", "track": "strategic", "counterargument": {"argument": "The draft exchange assumes 1968 video clips represent a statistically stable skill distribution across amateur league populations. Amateur league skill spread is far wider and noisier than the corpus; AI scores trained on this sample will not generalize to new player pools or seasons.", "evidence": "Market execution risk: league organizers adopt the system, teams drafted as 'balanced' via AI are actually mismatched. Word spreads that auto-drafts produce worse play experience. Churn and refund liability. The corpus is a convenience sample, not a population census.", "risk_level": "high"}, "multi_model_check": {"validation": "partial", "change_mind": "Stronger evidence than #1 but still thin. Would shift confidence with: (a) pilot with 2-3 amateur leagues showing 30%+ adoption for draft tool, (b) willingness-to-pay study showing organizers pay $100-500/season, (c) comparison to existing fantasy sports pricing models. Assumes amateur league organizers have budget and care about balance; needs validation.", "blind_spot": "Ignores that pickleball leagues may already solve balance manually or via cheap/free alternatives (handicap systems, snake drafts). Also: skill scoring accuracy is critical but untested\u2014wrong valuations destroy trust. Assumes skill metadata is granular enough to predict team chemistry, which video clip data alone may not capture."}, "follow_up": {"follow_up_question": "Next step to validate 'Pickleball Moneyball: Player Draft Exchange'?", "proposed_action": "Evaluate as Sports Infrastructure play", "assigned_researcher": "wildcard"}, "deep_dive_url": "deep-dives/wildcard-20260415-5706.html"}, {"finding_id": "wildcard-20260415-6736", "agent": "wildcard", "generated_at": "2026-04-15T06:57:34.345760+00:00", "title": "Brand Insertion: The Invisible Sponsor Layer", "confidence": 0.78, "evidence_summary": "License shot-pattern metadata to equipment manufacturers. Nike could target ads to viewers who watch high-arc defensive rallies (their string tension). But here's the twist: players get paid micro-bounties to execute branded shot patterns in their games. The corpus becomes a training ground for 'signature moves,' and brands bid on pattern exclusivity.", "business_value": "high", "category": "wildcard_idea", "novelty": 0.9, "recommended_action": "Evaluate as Advertising & Sponsorship play", "source_records": [], "raw_data": {"flywheel_score": 0.78, "category": "Advertising & Sponsorship"}, "composite_score": 0.2857, "plausibility": 0.6, "plausibility_note": "Ad insertion into clips is technically simple; legality/sponsorship negotiation is the blocker, not engineering.", "track": "strategic", "multi_model_check": {"validation": "no", "change_mind": "This is speculative ad-tech layered onto sports footage. Would require: (a) actual Nike/Adidas interest (RFP or LOI), (b) proof that shot-pattern metadata correlates with equipment preferences (e.g., high-arc players actually buy that string tension), (c) IPR/licensing clarity\u2014can you legally monetize player likenesses this way? Currently zero evidence of buyer demand or legal pathway.", "blind_spot": "Major ethical/legal blind spot: players didn't consent to having their 'shot signatures' turned into targeting vectors. Privacy and right-of-publicity risks are unaddressed. Also: attribution is weak\u2014viewing habits \u2260 purchase intent. Equipment sales are driven by brand loyalty and price, not micro-behavioral targeting of amateurs."}, "follow_up": {"follow_up_question": "Next step to validate 'Brand Insertion: The Invisible Sponsor Layer'?", "proposed_action": "Evaluate as Advertising & Sponsorship play", "assigned_researcher": "wildcard"}, "deep_dive_url": "deep-dives/wildcard-20260415-6736.html"}, {"finding_id": "frequenc gh", "category": "wildcard_idea", "novelty": 0.9, "recommended_action": "Evaluate as Creator Economy & Sponsorship play", "source_records": [], "raw_data": {"flywheel_score": 0.89, "category": "Creator Economy & Sponsorship"}, "composite_score": 0.388, "plausibility": 0.5, "plausibility_note": "Conceptually complex (closed-loop system design); doable as a mockup but not production-ready in 30 days.", "track": "strategic", "counterargument": {"argument": "The 'Skill Bounty' program creates a perverse incentive: players will practice and film artificial shot sequences designed to score well on the AI's metrics, not shots that win games. The corpus becomes self-selecting data of 'optimized-for-measurement' gameplay, not representative pickleball.", "evidence": "Cannibalization of corpus integrity. Once players learn which shots the AI rewards, the dataset shifts from observational pickleball to players gaming the labeling system. Scouting database becomes useless for real talent evaluation. You've created a feedback loop that destroys the asset you're monetizing.", "risk_level": "high"}, "multi_model_check": {"validation": "partial", "change_mind": "Most plausible of the five, but still early. Would strengthen with: (a) LOI from 1-2 equipment brands (Selkirk, Paddletek) showing interest in sponsoring shot challenges, (b) proof that players will perform on-camera for bounties (pilot with 50+ players), (c) cost-per-clip vs. traditional sports sponsorship ROI. The mechanics are sound, but no evidence brands see value.", "blind_spot": "Assumes equipment brands can't just sponsor pickleball tournaments directly (cheaper, broader visibility). Why pay for curated shot clips instead? Also: incentivizing artificial shots ('hit this arc angle') degrades corpus quality\u2014you're no longer capturing authentic play. Selection bias makes downstream AI training worse. May contaminate the entire dataset."}, "follow_up": {"follow_up_question": "Next step to validate 'The Corpus as a p"}, "composite_score": 0.2857, "plausibility": 0.6, "plausibility_note": "Ad insertion into clips is technically simple; legality/sponsorship negotiation is the blocker, not engineering.", "track": "strategic", "multi_model_check": {"validation": "no", "change_mind": "This is speculative ad-tech layered onto sports footage. Would require: (a) actual Nike/Adidas interest (RFP or LOI), (b) proof that shot-pattern metadata correlates with equipment preferences (e.g., high-arc players actually buy that string tension), (c) IPR/licensing clarity\u2014can you legally monetize player likenesses this way? Currently zero evidence of buyer demand or legal pathway.", "blind_spot": "Major ethical/legal blind spot: players didn't consent to having their 'shot signatures' turned into targeting vectors. Privacy and right-of-publicity risks are unaddressed. Also: attribution is weak\u2014viewing habits \u2260 purchase intent. Equipment sales are driven by brand loyalty and price, not micro-behavioral targeting of amateurs."}, "follow_up": {"follow_up_question": "Next step to validate 'Brand Insertion: The Invisible Sponsor Layer'?", "proposed_action": "Evaluate as Advertising & Sponsorship play", "assigned_researcher": "wildcard"}, "deep_dive_url": "deep-dives/wildcard-20260415-6736.html"}, {"finding_id": "wildcard-20260415-3382", "agent": "wildcard", "generated_at": "2026-04-15T06:57:34.345765+00:00", "title": "Pickleball Trading Cards 2.0: On-Chain Clip Ownership", "confidence": 0.71, "evidence_summary": "Tokenize video clips as NFTs with embedded metadata (skill level, viral score, shot rarity). Players earn tokens for appearing in the corpus; fans trade/collect them. The metadata becomes transparent, trustless, and immutable\u2014creating a secondary market where scarcity is enforced by AI-verified play quality, not artificial scarcity.", "business_value": "high", "category": "wildcard_idea", "novelty": 0.9, "recommended_action": "Evaluate as Web3 & Collectibles play", "source_records": [], "raw_data": {"flywheel_score": 0.71, "category": "Web3 & Collectibles"}, "composite_score": 0.2817, "plausibility": 0.65, "plausibility_note": "NFT/blockchain plumbing is mature; prototype works if you ignore IP licensing issues with clip ownership.", "track": "strategic", "multi_model_check": {"validation": "no", "change_mind": "NFT thesis requires: (a) proof that pickleball clip ownership has liquidity/secondary market demand (not just theoretical), (b) comparable sports NFT projects showing sustained user engagement (most failed post-2022), (c) legal clarity on what 'ownership' means\u2014do players get royalties? Fans resold tokens to whom? Currently riding crypto hype with no differentiation.", "blind_spot": "Assumes players and fans see value in 'owning' clips, but pickleball has no culture of collectibles (unlike basketball cards). Also ignores: custody/wallet friction, tax reporting for micro-earners, and that clip value collapses if the corpus loses cultural relevance. Doesn't address why this is better than simple revenue-share or licensing deals."}, "follow_up": {"follow_up_question": "Next step to validate 'Pickleball Trading Cards 2.0: On-Chain Clip Owners'?", "proposed_action": "Evaluate as Web3 & Collectibles play", "assigned_researcher": "wildcard"}, "deep_dive_url": "deep-dives/wildcard-20260415-3382.html"}, {"finding_id": "gap_finder-20260415-0497", "agent": "gap_finder", "generated_at": "2026-04-15T06:57:22.529445+00:00", "title": "Gap: Outcome & Shot Efficiency Data", "confidence": 0.6, "evidence_summary": "No explicit win/loss outcome, point scoring, or shot success rates exist. You can see 'dominant_shot' but not whether that shot won or lost the point. This blocks analysis of which shot patterns actually convert or lead to errors.\n\nEvidence: 'dominant_shot' (dink: 1256, drive: 562) and 'error_highlight' (13 clips) both exist, but there's no link between them. No 'shot_outcome' (won/lost/error), 'winner', 'error_type', or 'poin on"}, "composite_score": 0.5755, "plausibility": 0.75, "plausibility_note": "Marketplace MVP (coach profiles, booking, payment) is standard CRUD; regulatory burden minimal in US.", "track": "strategic", "multi_model_check": {"validation": "partial", "change_mind": "Evidence is conceptual, not validated. Would need: (a) interviews with 5+ coaches showing willingness to pay rev-share for API access vs. building in-house, (b) comparable SaaS coaching tool pricing/adoption, (c) proof that anonymized clips provide sufficient competitive advantage to justify licensing fees. Currently assumes coaches will monetize without showing market demand.", "blind_spot": "Doesn't address coach commoditization risk\u2014once the API is open, coaches' 'moat' erodes as all competitors access the same underlying data. Also ignores switching costs: why wouldn't coaches build their own clip analysis pipeline after learning from the free API? Revenue sustainability unclear."}, "follow_up": {"follow_up_question": "Next step to validate 'Open-Source Coaching Marketplace (Thesis: Coaches '?", "proposed_action": "Evaluate as Coaching & Education play", "assigned_researcher": "wildcard"}, "deep_dive_url": "deep-dives/wildcard-20260415-8712.html"}, {"finding_id": "wildcard-20260415-5706", "agent": "wildcard", "generated_at": "2026-04-15T06:57:34.345694+00:00", "title": "Pickleball Moneyball: Player Draft Exchange", "confidence": 0.92, "evidence_summary": "Turn the corpus into a real-time player valuation engine. Amateur league organizers pay to auto-draft balanced teams using AI skill scores. Each drafted player generates new video uploads (trying to improve their rating), creating a flywheel: more videos \u2192 better models \u2192 more accurate valuations \u2192 more leagues \u2192 more videos.", "business_value": "high", "category": "wildcard_idea", "novelty": 0.9, "recommended_action": "Evaluate as Sports Infrastructure play", "source_records": [], "raw_data": {"flywheel_score": 0.92, "category": "Sports Infrastructure"}, "composite_score": 0.5616, "plausibility": 0.7, "plausibility_note": "Fantasy sports mechanics are well-established; can prototype with PPA player stats in 30 days without licensing.", "track": "strategic", "counterargument": {"argument": "The draft exchange assumes 1968 video clips represent a statistically stable skill distribution across amateur league populations. Amateur league skill spread is far wider and noisier than the corpus; AI scores trained on this sample will not generalize to new player pools or seasons.", "evidence": "Market execution risk: league organizers adopt the system, teams drafted as 'balanced' via AI are actually mismatched. Word spreads that auto-drafts produce worse play experience. Churn and refund liability. The corpus is a convenience sample, not a population census.", "risk_level": "high"}, "multi_model_check": {"validation": "partial", "change_mind": "Stronger evidence than #1 but still thin. Would shift confidence with: (a) pilot with 2-3 amateur leagues showing 30%+ adoption for draft tool, (b) willingness-to-pay study showing organizers pay $100-500/season, (c) comparison to existing fantasy sports pricing models. Assumes amateur league organizers have budget and care about balance; needs validation.", "blind_spot": "Ignores that pickleball leagues may already solve balance manually or via cheap/free alternatives (handicap systems, snake drafts). Also: skill scoring accuracy is critical but untested\u2014wrong valuations destroy trust. Assumes skill metadata is granular enough to predict team chemistry, which video clip data alone may not capture."}, "follow_up": {"follow_up_question": "Next step to validate 'Pickleball Moneyball: Player Draft Exchange'?", "proposed_action": "Evaluate as Sports Infrastructure play", "assigned_researcher": "wildcard"}, "deep_dive_url": "deep-dives/wildcard-20260415-5706.html"}, {"finding_id": "entity_profiler-20260415-7396", "agent": "entity_profiler", "generated_at" const DECISIONS_KEY = 'lab-general-purpose-decisions';
let dec = JSON.parse(localStorage.getItem(DECISIONS_KEY) || '{}');

function saveDec(id, a) {
  const f = D.all_findings?.find(x => x.finding_id === id);
  dec[id] = {action: a, at: new Date().toISOString(), category: f?.category || '', agent: f?.agent || '', title: f?.title || ''};
  localStorage.setItem(DECISIONS_KEY, JSON.stringify(dec));
  render();
}
function getDec(id) { return dec[id]?.action || null; }
function exportDec() {
  const b = new Blob([JSON.stringify(dec, null, 2)], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(b);
  a.download = 'decisions-general-purpose.json';
  a.click();
}
function clearDec() {
  if (confirm('Reset all decisions for this lab?')) {
    dec = {};
    localStorage.removeItem(DECISIONS_KEY);
    render();
  }
}

function mr(v) {
  const p = Math.round(v * 100), c = p >= 70 ? 'g' : p >= 40 ? 'y' : 'r';
  return `<span class="mr"><span class="mr-f ${c}" style="width:${p}%"></span></span>`;
}

function ca(o) {
  if (!o) return '';
  return `<div class="ca"><div class="ca-h">Devil's Advocate · ${o.risk_level || 'medium'} risk</div><div>${o.evidence || o.argument || ''}</div></div>`;
}

function mm(o) {
  if (!o) return '';
  return `<div class="mm"><div class="mm-h">Independent Validation · ${o.validation}</div><div>Blind spot: ${o.blind_spot || 'none noted'}</div></div>`;
}

function card(f, rk, big) {
  const d = getDec(f.finding_id), dc = d ? ` ${d}` : '';
  const trk = f.track === 'strategic' ? ' s' : ' d';
  const eid = 'x-' + f.finding_id;
  const ddUrl = f.deep_dive_url ? `<a href="../${f.deep_dive_url}" class="bt dd" onclick="event.stopPropagation()">Go Deeper</a>` : '';

  return `<div class="cd${trk}${dc}" onclick="tog('${eid}', this)">
    <div class="cd-rk">#${rk}</div>
    <div class="cd-ti">${f.title || 'Untitled'}</div>
    <div class="cd-ev">${(f.evidence_summary || '').substring(0, 180)}</div>
    <div class="cd-mt">
      <span class="tg ag">${f.agent}</span>
      <span class="tg ${f.business_value === 'high' ? 'h' : f.business_value === 'medium' ? 'm' : 'l'}">${f.business_value}</span>
      <span class="tg ct">${f.category}</span>
      <span style="color:var(--mt);font-size:9px;font-family:'Red Hat Mono',monospace">${(f.confidence * 100).toFixed(0)}%${mr(f.confidence)}</span>
      ${f.composite_score ? `<span style="color:oklch(40% .02 240);font-size:9px;font-family:'Red Hat Mono',monospace">${f.composite_score.toFixed(3)}</span>` : ''}
      ${f.counterargument ? '<span style="color:var(--er);font-size:9px;font-family:Red Hat Mono,monospace">DA</span>' : ''}
      ${f.multi_model_check ? '<span style="color:var(--cy);font-size:9px;font-family:Red Hat Mono,monospace">MM</span>' : ''}
    </div>
    <div class="xb" id="${eid}">
      <div class="xs"><h4>Evidence</h4><p>${f.evidence_summary || ''}</p></div>
      ${f.recommended_action ? `<div class="xs"><h4>Action</h4><p>${f.recommended_action}</p></div>` : ''}
      ${f.plausibility_note ? `<div class="xs"><h4>Plausibility</h4><p>${f.plausibility_note} (score: ${(f.plausibility || 0).toFixed(2)})</p></div>` : ''}
      ${ca(f.counterargument)}
      ${mm(f.multi_model_check)}
      <div class="acts">
        <button class="bt ap" onclick="event.stopPropagation();saveDec('${f.finding_id}','approved')">Approve</button>
        <button class="bt pk" onclick="event.stopPropagation();saveDec('${f.finding_id}','parked')">Park</button>
        <button class="bt dm" onclick="event.stopPropagation();saveDec('${f.finding_id}','dismissed')">Dismiss</button>
        ${ddUrl}
      </div>
    </div>
  </div>`;
}

function tog(id, el) {
  const x = el.classList.contains('ex');
  document.querySelectorAll('.cd.ex').forEach(c => c.classList.remove('ex'));
  if (!x) el.classList.add('ex');
}

function render() {
  const ts = D.top_strategic || [];
  const td = D.top_data || [];
  const cs = D.corpus_stats || {};
  const auto = D.autonomous_evolution || {};
  const fl = D.feedback_loop || {};

  document.getElementById('chips').innerHTML = `
    <span class="chip ac">${cs.researchers_run || 0} researchers</span>
    <span class="chip pu">${cs.strategic_count || 0} strategic</span>
    <span class="chip cy">${cs.data_count || 0} data</span>
    ${(D.counterarguments || []).length ? `<span class="chip er">${D.counterarguments.length} DA</span>` : ''}
    ${(D.connections || []).length ? `<span class="chip">${D.connections.length} connections</span>` : ''}`;

  document.getElementById('tc').textContent = `${ts.length + td.length}`;
  document.getElementById('sc').innerHTML = ts.length ? ts.map((f, i) => card(f, i + 1, true)).join('') : '<p style="color:var(--mt);font-size:12px">None</p>';
  document.getElementById('dc').innerHTML = td.length ? td.map((f, i) => card(f, i + 1, true)).join('') : '<p style="color:var(--mt);font-size:12px">None</p>';

  const agents = [...new Set((D.all_findings || []).map(f => f.agent))].sort();
  document.getElementById('fa').innerHTML = '<option value="">All Researchers</option>' + agents.map(a => `<option value="${a}">${a}</option>`).join('');

  document.getElementById('corpus-stats').innerHTML = `
    <div class="it"><span class="lb">Unique findings</span><span class="vl">${cs.unique_findings || 0}</span></div>
    <div class="it"><span class="lb">Strategic</span><span class="vl">${cs.strategic_count || 0}</span></div>
    <div class="it"><span class="lb">Data</span><span class="vl">${cs.data_count || 0}</span></div>`;

  document.getElementById('rs').innerHTML = (D.researcher_stats || []).map(r =>
    `<div class="it"><span class="lb">${r.agent}</span><span class="vl">${r.findings_count}${r.duration_seconds ? ' · ' + r.duration_seconds + 's' : ''}</span></div>`).join('');

  const a = Object.values(dec).filter(x => x.action === 'approved').length;
  const p = Object.values(dec).filter(x => x.action === 'parked').length;
  const dm = Object.values(dec).filter(x => x.action === 'dismissed').length;
  const total = (D.all_findings || []).length;
  document.getElementById('ds').innerHTML = `
    <div class="it"><span class="lb" style="color:var(--ac)">Approved</span><span class="vl">${a}</span></div>
    <div class="it"><span class="lb" style="color:var(--wn)">Parked</span><span class="vl">${p}</span></div>
    <div class="it"><span class="lb" style="color:var(--mt)">Dismissed</span><span class="vl">${dm}</span></div>
    <div class="it"><span class="lb">Pending</span><span class="vl">${total - a - p - dm}</span></div>`;

  const cns = D.connections || [];
  if (cns.length) {
    document.getElementById('cnx').style.display = 'block';
    document.getElementById('cn').innerHTML = cns.map(c =>
      `<div style="padding:8px 0;border-bottom:1px solid var(--bds);font-size:11px"><div style="color:var(--wn);font-weight:600">${c.type.replace(/_/g, ' ')}</div><div style="color:var(--tx2)">${c.combined_insight || c.connection}</div>${c.product_concept ? `<div style="color:var(--ac);margin-top:4px;font-weight:600">→ ${c.product_concept.name}</div>` : ''}</div>`).join('');
  }

  document.getElementById('auto').innerHTML = `
    <div class="it"><span class="lb">Trend runs</span><span class="vl">${auto.trend_runs || 0}</span></div>
    <div class="it"><span class="lb">Recurring</span><span class="vl">${auto.recurring_findings || 0}</span></div>
    <div class="it"><span class="lb">Auto-boosted</span><span class="vl">${auto.auto_boosted || 0}</span></div>
    <div class="it"><span class="lb">Plausibility</span><span class="vl">${auto.plausibility_filtered || 0}</span></div>
    <div class="it"><span class="lb">Multi-model</span><span class="vl">${auto.multi_model_validated || 0}</span></div>`;

  renderList();
}

function renderList() {
  const t = document.getElementById('ft').value;
  const a = document.getElementById('fa').value;
  const b = document.getElementById('fb').value;
  const so = document.getElementById('fs').value;
  let it = [...(D.all_findings || [])];
  if (t) it = it.filter(f => f.track === t);
  if (a) it = it.filter(f => f.agent === a);
  if (b) it = it.filter(f => f.business_value === b);
  if (so === 'confidence') it.sort((a, b) => b.confidence - a.confidence);
  else if (so === 'novelty') it.sort((a, b) => (b.novelty || 0) - (a.novelty || 0));
  else if (so === 'agent') it.sort((a, b) => a.agent.localeCompare(b.agent));
  document.getElementById('fc').textContent = `${it.length}`;
  document.getElementById('fl').innerHTML = it.map((f, i) => card(f, i + 1)).join('');
}

['ft', 'fa', 'fb', 'fs'].forEach(id => document.getElementById(id).addEventListener('change', renderList));
render();
</script>
