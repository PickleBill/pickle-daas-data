<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Classifier Idea Lab — Explorer</title>
<style>
  :root {
    --bg: #0a0f1a;
    --surface: #111826;
    --surface-2: #1a2336;
    --border: #222b3f;
    --text: #e6edf7;
    --muted: #7a8496;
    --accent: #ffb347;         /* warm orange — this lab's color */
    --accent-2: #ff7a45;
    --good: #39d98a;
    --warn: #ffcc66;
    --bad: #ff5c6c;
    --track-strategic: #a384ff;
    --track-data: #4ec9ff;
    --track-counter: #ff8aa0;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: ui-sans-serif, system-ui, -apple-system, "Inter", sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.5;
  }
  header {
    padding: 22px 24px 14px; border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, #13192a 0%, #0a0f1a 100%);
    position: sticky; top: 0; z-index: 30;
    backdrop-filter: blur(8px);
  }
  h1 { margin: 0 0 4px; font-size: 22px; letter-spacing: -0.01em; }
  h1 .accent { color: var(--accent); }
  .meta { color: var(--muted); font-size: 13px; display: flex; gap: 16px; flex-wrap: wrap; }
  .meta b { color: var(--text); font-weight: 600; }
  .stats-pill {
    display: inline-block; padding: 2px 10px; border-radius: 999px;
    background: var(--surface-2); border: 1px solid var(--border);
    font-size: 12px; margin-right: 6px;
  }
  main {
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 18px;
    padding: 22px; max-width: 1600px; margin: 0 auto;
  }
  @media (max-width: 1100px) { main { grid-template-columns: 1fr; } }
  .col { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px; }
  .col-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 12px; }
  .col-title { font-size: 15px; font-weight: 600; letter-spacing: 0.02em; text-transform: uppercase; }
  .col-count { color: var(--muted); font-size: 13px; }
  .col-strategic .col-title { color: var(--track-strategic); }
  .col-data .col-title { color: var(--track-data); }
  .col-counter .col-title { color: var(--track-counter); }
  .finding {
    background: var(--surface-2); border: 1px solid var(--border); border-radius: 10px;
    padding: 13px 14px; margin-bottom: 10px; cursor: pointer;
    transition: transform 0.08s ease, border-color 0.12s ease;
  }
  .finding:hover { border-color: var(--accent); }
  .finding.approved { border-color: var(--good); background: rgba(57,217,138,0.06); }
  .finding.parked { border-color: var(--warn); background: rgba(255,204,102,0.06); }
  .finding.dismissed { opacity: 0.4; }
  .finding-title { font-weight: 600; font-size: 14px; line-height: 1.4; margin-bottom: 6px; }
  .finding-meta { color: var(--muted); font-size: 12px; display: flex; gap: 10px; flex-wrap: wrap; }
  .finding-body { display: none; margin-top: 10px; font-size: 13px; color: #cfd6e3; }
  .finding.expanded .finding-body { display: block; }
  .finding-body p { margin: 6px 0; }
  .finding-body .label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; margin-top: 10px; display: block; }
  .bv-high { color: var(--good); font-weight: 600; }
  .bv-medium { color: var(--warn); }
  .bv-low { color: var(--muted); }
  .actions { display: flex; gap: 6px; margin-top: 10px; }
  .btn {
    flex: 1; padding: 6px 10px; border-radius: 6px; border: 1px solid var(--border);
    background: transparent; color: var(--text); cursor: pointer; font-size: 12px;
    font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase;
    transition: all 0.1s ease;
  }
  .btn:hover { border-color: var(--accent); }
  .btn-approve.active, .btn-approve:hover { background: var(--good); color: #0a0f1a; border-color: var(--good); }
  .btn-park.active, .btn-park:hover { background: var(--warn); color: #0a0f1a; border-color: var(--warn); }
  .btn-dismiss.active, .btn-dismiss:hover { background: var(--bad); color: #0a0f1a; border-color: var(--bad); }
  .counterarg {
    border-left: 3px solid var(--track-counter); padding: 8px 10px; margin-top: 10px;
    background: rgba(255,138,160,0.06); border-radius: 0 6px 6px 0; font-size: 12.5px;
  }
  .counterarg .ca-title { font-weight: 600; color: var(--track-counter); }
  .counterarg .ca-severity { display: inline-block; padding: 1px 6px; border-radius: 4px;
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    background: var(--track-counter); color: #0a0f1a; margin-left: 6px; }
  .empty { text-align: center; color: var(--muted); padding: 40px 12px; font-size: 13px; }
  footer {
    text-align: center; padding: 16px; color: var(--muted); font-size: 12px;
    border-top: 1px solid var(--border); margin-top: 20px;
  }
  .export-btn {
    background: var(--accent); color: #0a0f1a; font-weight: 700; border: none;
    padding: 4px 12px; border-radius: 6px; cursor: pointer; margin-left: 8px; font-size: 12px;
  }
  .export-btn:hover { background: var(--accent-2); }
  code { background: var(--surface-2); padding: 1px 6px; border-radius: 4px; font-size: 12px; }
</style>
</head>
<body>
<header>
  <h1>🧠 <span class="accent">Classifier</span> Idea Lab</h1>
  <div class="meta" id="meta-row"></div>
</header>
<main>
  <section class="col col-strategic">
    <div class="col-header">
      <div class="col-title">Strategic Ideas</div>
      <div class="col-count" id="count-strategic"></div>
    </div>
    <div id="list-strategic"></div>
  </section>
  <section class="col col-data">
    <div class="col-header">
      <div class="col-title">Data Insights</div>
      <div class="col-count" id="count-data"></div>
    </div>
    <div id="list-data"></div>
  </section>
  <section class="col col-counter">
    <div class="col-header">
      <div class="col-title">Devil's Advocate</div>
      <div class="col-count" id="count-counter"></div>
    </div>
    <div id="list-counter"></div>
  </section>
</main>
<footer>
  Decisions stored in localStorage (<code>classifier-lab-decisions</code>).
  <button class="export-btn" onclick="exportDecisions()">Export JSON</button>
  <button class="export-btn" onclick="clearDecisions()" style="background:#444;color:#fff">Reset</button>
</footer>

<script>
const DATA = {"run_id": "classifier-lab-2026-04-15", "generated_at": "2026-04-15T08:16:47.850418+00:00", "mode": "full", "researchers_run": 6, "corpus_stats": {"total_findings": 33, "unique_findings": 24, "strategic_count": 8, "data_count": 16, "counterargs_attached": 8}, "feedback_loop": {"decisions_loaded": 0, "category_signals": {}, "agent_signals": {}}, "top_strategic": [{"finding_id": "wildcard-20260415-2375", "agent": "wildcard", "generated_at": "2026-04-15T08:16:30.938812+00:00", "title": "Brand Safety Engine for Sports Streaming", "confidence": 0.92, "evidence_summary": "Every sports streamer fears misattribution and brand safety disasters. Offer a white-label real-time classifier that flags brand appearances, validates them against streamer's approved list, and auto-blocks or flags unsafe associations. Your 49-rule corpus becomes the gold standard; you own the SLA for accuracy.", "business_value": "high", "category": "wildcard_idea", "novelty": 0.9, "recommended_action": "Evaluate: platform_play play", "source_clips": [], "raw_data": {"flywheel_score": 0.92, "category": "platform_play"}, "composite_score": 0.936, "counterargument": {"argument": "Streamers already have legal+compliance teams reviewing brand safety \u2014 this adds a dependency on your classifier's recall, not their existing workflows.", "risk": "If your classifier misses a brand appearance (false negative), the streamer's compliance team still catches it, but now they distrust your system and stop using it. If you over-flag (false positive), you create alert fatigue and the streamer disables the feature. Either way, you've inserted yourself into a critical safety path without solving the core problem \u2014 human review is still required.", "severity": "high"}}, {"finding_id": "wildcard-20260415-7851", "agent": "wildcard", "generated_at": "2026-04-15T08:16:30.938840+00:00", "title": "Venue Operating System: Sponsor Dashboard", "confidence": 0.88, "evidence_summary": "Embed the classifier into venue software. Real-time sponsor dashboard: 'Your brand appeared 47 times in last 3 tournaments, 23 of those in broadcast-grade moments.' Venues become the distribution layer for your classifier. They upsell sponsors on data; you get higher accuracy feedback and recurring venue licensing.", "business_value": "high", "category": "wildcard_idea", "novelty": 0.9, "recommended_action": "Evaluate: platform_play play", "source_clips": [], "raw_data": {"flywheel_score": 0.88, "category": "platform_play"}, "composite_score": 0.924, "counterargument": {"argument": "Venues care about sponsorship ROI, not brand appearance counts \u2014 they want attribution tied to viewer engagement or sales lift, which your classifier doesn't measure.", "risk": "You're embedding a classifier into venue software that answers 'how many times did this brand appear?' but venues actually need 'did this appearance drive sponsor value?' Without converting raw detections into business metrics, adoption stalls and venues rip out the integration. If venues start making sponsorship renewal decisions based on your appearance counts alone, you're liable for inflated or deflated metrics that affect their revenue.", "severity": "high"}}, {"finding_id": "wildcard-20260415-4639", "agent": "wildcard", "generated_at": "2026-04-15T08:16:30.938852+00:00", "title": "Taxonomy Licensing to Competing Sports Data Vendors", "confidence": 0.87, "evidence_summary": "Tennis/padel/squash data companies are solving your old problem \u2014 they built generic classifiers. License them the pickleball taxonomy structure, the rule-writing methodology, and crucially: your decision-loop framework (classifier\u2192human\u2192update\u2192retrain). They pay per sport instance; each sport improves your core IP.", "business_value": "high", "category": "wildcard_idea", "novelty": 0.9, "recommended_action": "Evaluate: licensing play", "source_clips": [], "raw_data": {"flywheel_score": 0.87, "category": "licensing"}, "composite_score": 0.921, "counterargument": {"argument": "Competing sports data vendors already have domain expertise and customer relationships \u2014 licensing your taxonomy doesn't guarantee they'll use it correctly or maintain quality alignment.", "risk": "If a tennis vendor licenses your rules but applies them loosely (different video quality, different rule interpretation), they'll produce bad classifications under your methodology name, damaging your brand. You also lose control over taxonomy evolution \u2014 they'll fork it, and now you have fragmented versions in the wild. Auditing their implementations will become expensive, and you have no leverage to force them to stay aligned.", "severity": "high"}}, {"finding_id": "wildcard-20260415-9395", "agent": "wildcard", "generated_at": "2026-04-15T08:16:30.938862+00:00", "title": "Open-Source Classifier + Managed Service Upsell", "confidence": 0.85, "evidence_summary": "Release the 49-rule taxonomy and decision logic as Apache 2.0. Competing sports and venues adopt it freely. Monetize the managed tier: we host it, we retrain it monthly with your footage, we guarantee 95%+ accuracy. Free adoption \u2192 high switching costs \u2192 recurring SaaS revenue.", "business_value": "high", "category": "wildcard_idea", "novelty": 0.9, "recommended_action": "Evaluate: tool_spinoff play", "source_clips": [], "raw_data": {"flywheel_score": 0.85, "category": "tool_spinoff"}, "composite_score": 0.915, "counterargument": {"argument": "Open-sourcing the taxonomy invites rule contributions from low-quality actors, fragmenting the standard and degrading the managed service's value prop.", "risk": "If you release 49 rules under Apache 2.0, someone will fork it, add 100 bad rules, and call it 'Pickle Classifier Pro.' Your managed service now competes against a free variant that might actually be more feature-complete (even if lower quality). Venues and brands won't pay for 'guaranteed 95%+ accuracy' when a free fork claims 98%. You also lose audit control \u2014 you can't enforce that commercial forks maintain your accuracy standards, creating liability if a bad fork is used for compliance decisions.", "severity": "medium"}}, {"finding_id": "wildcard-20260415-3747", "agent": "wildcard", "generated_at": "2026-04-15T08:16:30.938871+00:00", "title": "Crowdsourced Rule Expansion as a Moat", "confidence": 0.84, "evidence_summary": "Commission external sports leagues (badminton, pickleball in 15 countries, padel) to supply footage + human reviewers. They help you build region/sport variants of the 49-rule core. You own the aggregate decision data; they get localized classifier. Data moat deepens; you become the standard.", "business_value": "high", "category": "wildcard_idea", "novelty": 0.9, "recommended_action": "Evaluate: crowdsource play", "source_clips": [], "raw_data": {"flywheel_score": 0.84, "category": "crowdsource"}, "composite_score": 0.912, "counterargument": {"argument": "Crowdsourcing rule expansion introduces quality variance and dilutes ownership of the decision-making framework.", "risk": "If badminton and padel leagues contribute rules but apply them inconsistently (different definition of 'visible brand' across sports), your aggregate training data becomes noisy. You claim ownership of the decision data, but if a padel league's rule causes false positives in pickleball videos, you're responsible for the fallout. Managing 15 regional variants also means you can't roll back a bad rule globally \u2014 you have to negotiate with each league. The 'moat' of aggregate decision data only works if all variants converge; if they diverge, you're managing a splintered taxonomy.", "severity": "medium"}}, {"finding_id": "wildcard-20260415-4491", "agent": "wildcard", "generated_at": "2026-04-15T08:16:30.938879+00:00", "title": "Brand Verification Marketplace", "confidence": 0.81, "evidence_summary": "Brands claim 'we appeared in 500 hours of pro pickleball content.' You become the auditor. Offer a verification badge: 'Verified by Pickle DaaS Classifier.' Brands pay for audit; pay-per-verified-appearance. Your rule set is the trust anchor; competitors can't replicate the decision corpus.", "business_value": "high", "category": "wildcard_idea", "novelty": 0.9, "recommended_action": "Evaluate: trust_play play", "source_clips": [], "raw_data": {"flywheel_score": 0.81, "category": "trust_play"}, "composite_score": 0.903, "counterargument": {"argument": "Brands are already claiming inflated sponsorship metrics; your classifier doesn't solve the fundamental misalignment between what brands claim and what they actually received.", "risk": "If a brand pays for a 'verification badge' and your classifier certifies '500 hours of appearances,' but a competitor challenges the audit, you're now the arbiter of a revenue-affecting claim. False negatives (you miss real appearances) anger the brand; false positives (you count background blur as a brand) expose you to fraud allegations. You also create a perverse incentive for brands to push for overly permissive rules so their audit score is higher, further degrading classifier accuracy across all downstream users who trust the same rules.", "severity": "high"}}], "top_data": [{"finding_id": "unknown_surfer-20260415-0118", "agent": "unknown_surfer", "generated_at": "2026-04-15T08:16:13.103569+00:00", "title": "Top 10 unknown brands account for 314 detections \u2014 high-leverage rule targets", "confidence": 0.85, "evidence_summary": "Most frequent unknowns: JOOLA(220): 'shirt chest'; 7(21): 'Signage on the fence in the background'; R&M(16): 'Top left corner of the video feed overla'; goomba(16): 'Top left corner of the video feed overla'; Unknown(9): 'worn by the primary player'; UG(9): 'Banner on the wall behind the court'. A rule for any of these immediately converts N detections from unknown to classified. Sort by frequency and research top 5.", "business_value": "high", "category": "rule_opportunity", "novelty": 0.75, "recommended_action": "For each top unknown: 1-call Haiku research ('what is X in the pickleball world?'); propose rule.", "source_clips": [], "raw_data": {"top_unknowns": [["JOOLA", 220], ["7", 21], ["R&M", 16], ["goomba", 16], ["Unknown", 9], ["UG", 9], ["R&M_fox_wifi_goomba", 9], ["R8M", 6], ["2026-01-05", 4], ["Foz_4_UG_Court", 4]], "location_samples": {"JOOLA": "shirt chest", "7": "Signage on the fence in the background", "R&M": "Top left corner of the video feed overlay", "goomba": "Top left corner of the video feed overlay", "Unknown": "worn by the primary player", "UG": "Banner on the wall behind the court", "R&M_fox_wifi_goomba": "top left corner of the video feed overlay", "R8M": "Top left corner of the video feed overlay", "2026-01-05": "Top left corner of the video feed overlay", "Foz_4_UG_Court": "Signage on the wall behind the court."}}, "composite_score": 0.875, "counterargument": {"argument": "Top unknowns like JOOLA (220 detections) may be concentrated in a single tournament or camera angle \u2014 writing rules for dataset-specific noise won't generalize.", "risk": "If you call Haiku research and learn 'JOOLA is a paddle brand that appears on 20% of player gear,' you'll want to add a rule. But 220 detections across how many videos? If they're all from one tournament with one camera position, the rule won't fire in future tournaments. You'll also create a precedent that every brand appearing 16+ times gets a rule, leading to rule bloat. Without stratifying detections by video source, date, and camera angle, you can't distinguish signal from noise.", "severity": "high"}}, {"finding_id": "rule_impact_hunter-20260415-7614", "agent": "rule_impact_hunter", "generated_at": "2026-04-15T08:16:08.869673+00:00", "title": "7.4% of classifications are fallback (no rule match) \u2014 every % is a rule gap", "confidence": 0.85, "evidence_summary": "340 detections use fallback classification vs 4261 that match a rule (92.6% rule coverage). Fallback is the classifier guessing \u2014 each one is a rule we haven't written yet.", "business_value": "high", "category": "rule_coverage", "novelty": 0.7, "recommended_action": "Cluster fallback detections and promote the top clusters into new rules.", "source_clips": [], "raw_data": {"by_source": {"rule": 4261, "fallback": 340, "none": 0}, "rule_pct": 92.6, "fallback_pct": 7.4}, "composite_score": 0.865, "counterargument": {"argument": "A 7.4% fallback rate may be acceptable \u2014 not every detection deserves a rule, and creating rules for rare edge cases increases false positives and maintenance burden.", "risk": "If you aggressively promote fallback detections into new rules without understanding *why* they fell back, you'll add rules that match too broadly or contradict existing rules. This introduces silent drift \u2014 your rule count grows from 49 to 70+, but you haven't tested rule interaction effects. You also risk overfitting to this specific dataset; rules optimized for these 340 fallbacks may perform poorly on future footage. Migrations to a larger taxonomy are operationally expensive and break downstream dashboards expecting the original 49 rules.", "severity": "high"}}, {"finding_id": "rule_impact_hunter-20260415-1417", "agent": "rule_impact_hunter", "generated_at": "2026-04-15T08:16:08.869646+00:00", "title": "1 rules look right but you override them often", "confidence": 0.8, "evidence_summary": "DUDE CLOTHING: 1/2 decisions overridden (4 corpus fires). Sample note: \"Probably something there. Keep looking out for underserved brands and try to build some confidence around it. It could be fun and rewarding.\" These rules pass the auto-verified bar but your manual review keeps correcting them \u2014 the classification they produce is technically legal but rarely what you actually want.", "business_value": "high", "category": "rule_calibration", "novelty": 0.8, "recommended_action": "Adjust the rule defaults to match the override you keep making.", "source_clips": [], "raw_data": {"wrong_rules": [["DUDE CLOTHING", 4, 1, 2]], "override_notes_sample": {"PSA": ["Oh, okay, this is cool. You actually have some versions of uploaded videos that I put in for manual AI analysis. Let's definitely classify these as much as possible, and there should be a lot more dat", "Oh, okay, this is cool. You actually have some versions of uploaded videos that I put in for manual AI analysis. Let's definitely classify these as much as possible, and there should be a lot more dat"], "W": ["I'm going to comment on this one along with the last one as an investigate and I think it makes sense to build another branch because these are classes of videos that are actually self-uploaded from a", "I'm going to comment on this one along with the last one as an investigate and I think it makes sense to build another branch because these are classes of videos that are actually self-uploaded from a"], "PBS": ["I personally don't see the PBS on the video, but if you've identified that as an apparel top, I do think that's valuable. This is the kind of granular insights that we want to get into for what it's w"]}}, "composite_score": 0.86}, {"finding_id": "unknown_surfer-20260415-0216", "agent": "unknown_surfer", "generated_at": "2026-04-15T08:16:13.103512+00:00", "title": "25 items in investigate queue read like real brands", "confidence": 0.8, "evidence_summary": "Likely real brands stuck waiting: PUSHIT; PKLR; PBS; PSA; PKLR; PBS. Their rationales mention product context (paddle, apparel, sponsor, etc.). If left unclassified, they inflate the unknown bucket and hide signal.", "business_value": "high", "category": "unknown_rescue", "novelty": 0.8, "recommended_action": "Auto-research each via web lookup, draft a proposed rule, ship for review.", "source_clips": [], "raw_data": {"likely_brands": ["PUSHIT", "PKLR", "PBS", "PSA", "PKLR", "PBS", "BHP", "FANADIR", "ODESSA", "PSA", "PKLR", "FANADIR", "ODESSA", "VAERSA", "PSA", "PKLR", "FANADIR", "ODESSA", "VAERSA", "ELGOUNA", "USA", "READY TO P }
function saveDecisions(d) { localStorage.setItem(LS_KEY, JSON.stringify(d)); }
function esc(s) { return String(s ?? "").replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"}[c])); }

function renderMeta() {
  const s = DATA.corpus_stats || {};
  const fb = DATA.feedback_loop || {};
  const el = document.getElementById("meta-row");
  el.innerHTML = `
    <span><b>${DATA.researchers_run ?? "?"}</b> researchers</span>
    <span><b>${s.unique_findings ?? 0}</b> findings</span>
    <span><b>${s.counterargs_attached ?? 0}</b> challenged</span>
    <span><b>${fb.decisions_loaded ?? 0}</b> previous decisions</span>
    <span style="color:var(--muted)">run ${esc(DATA.run_id || "?")}</span>
  `;
}

function renderFinding(f, decisions) {
  const bv = f.business_value || "medium";
  const decision = decisions[f.finding_id]?.action || "";
  const ca = f.counterargument;
  const stateClass = decision ? decision : "";
  return `
    <div class="finding ${stateClass}" data-id="${f.finding_id}">
      <div class="finding-title">${esc(f.title || "Untitled")}</div>
      <div class="finding-meta">
        <span>[${esc(f.agent || "")}]</span>
        <span>conf: ${(f.confidence ?? 0).toFixed(2)}</span>
        <span>score: ${(f.composite_score ?? 0).toFixed(2)}</span>
        <span class="bv-${bv}">${esc(bv)}</span>
      </div>
      <div class="finding-body">
        <span class="label">Evidence</span>
        <p>${esc(f.evidence_summary || "")}</p>
        ${f.recommended_action ? `<span class="label">Recommended action</span><p>${esc(f.recommended_action)}</p>` : ""}
        ${ca ? `
          <div class="counterarg">
            <span class="ca-title">Devil's advocate</span>
            <span class="ca-severity">${esc(ca.severity || "med")}</span>
            <p style="margin-top:4px"><b>${esc(ca.argument || "")}</b></p>
            <p style="color:var(--muted)">${esc(ca.risk || "")}</p>
          </div>` : ""}
        <div class="actions">
          <button class="btn btn-approve ${decision==='approved'?'active':''}" data-a="approved">Approve</button>
          <button class="btn btn-park ${decision==='parked'?'active':''}" data-a="parked">Park</button>
          <button class="btn btn-dismiss ${decision==='dismissed'?'active':''}" data-a="dismissed">Dismiss</button>
        </div>
      </div>
    </div>
  `;
}

function renderColumn(id, findings, decisions) {
  const el = document.getElementById(id);
  if (!findings.length) { el.innerHTML = '<div class="empty">No findings in this track.</div>'; return; }
  el.innerHTML = findings.map(f => renderFinding(f, decisions)).join("");
}

function wireCards() {
  document.querySelectorAll(".finding").forEach(card => {
    const id = card.dataset.id;
    card.addEventListener("click", (e) => {
      if (e.target.closest(".btn")) return;
      card.classList.toggle("expanded");
    });
    card.querySelectorAll(".btn").forEach(b => {
      b.addEventListener("click", (e) => {
        e.stopPropagation();
        const action = b.dataset.a;
        const d = loadDecisions();
        // find the finding to stash category/agent for feedback signal
        const finding = (DATA.all_findings || []).find(x => x.finding_id === id);
        if (d[id]?.action === action) {
          delete d[id];
        } else {
          d[id] = {
            action,
            at: new Date().toISOString(),
            title: finding?.title || "",
            category: finding?.category || "",
            agent: finding?.agent || "",
          };
        }
        saveDecisions(d);
        render();
      });
    });
  });
}

function render() {
  renderMeta();
  const decisions = loadDecisions();
  const strategic = DATA.top_strategic || [];
  const data = DATA.top_data || [];
  // Build counter list from findings that have counterargument attached
  const counterItems = (DATA.all_findings || [])
    .filter(f => f.counterargument)
    .map(f => ({
      ...f,
      title: `⚠ ${f.counterargument.argument}`,
      evidence_summary: `Challenges: "${f.title}". Risk: ${f.counterargument.risk}`,
      business_value: f.counterargument.severity || "medium",
      agent: "devils_advocate",
      composite_score: f.composite_score,
      recommended_action: `Weigh before acting on: ${f.title}`,
      counterargument: null,
    }));
  document.getElementById("count-strategic").textContent = `${strategic.length} ideas`;
  document.getElementById("count-data").textContent = `${data.length} insights`;
  document.getElementById("count-counter").textContent = `${counterItems.length} challenges`;
  renderColumn("list-strategic", strategic, decisions);
  renderColumn("list-data", data, decisions);
  renderColumn("list-counter", counterItems, decisions);
  wireCards();
}

function exportDecisions() {
  const d = loadDecisions();
  const blob = new Blob([JSON.stringify(d, null, 2)], {type: "application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "classifier-lab-decisions.json";
  a.click();
  URL.revokeObjectURL(url);
}
function clearDecisions() {
  if (confirm("Reset all approve/park/dismiss decisions for this browser?")) {
    localStorage.removeItem(LS_KEY);
    render();
  }
}

render();
</script>
</body>
</html>
