<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pickle DaaS -- Visual Intelligence Explorer</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0C0C14;--bg2:#12121E;--bg3:#1A1A2E;
  --text:#F5F0EB;--text2:#A09B94;--text3:#6B665F;
  --green:#00E676;--orange:#FF8B3D;--red:#E74C3C;
  --blue:#3D8BFF;--purple:#9B59B6;
}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow-x:hidden;font-size:15px;line-height:1.6}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px}
a{color:var(--orange);text-decoration:none}

.container{max-width:1320px;margin:0 auto;padding:0 24px}

/* HERO — Featured Clip */
.hero{position:relative;width:100%;overflow:hidden;background:var(--bg)}
.hero-inner{max-width:1320px;margin:0 auto;padding:24px 24px 0}
.hero-video-wrap{position:relative;border-radius:12px;overflow:hidden;aspect-ratio:16/7;background:#000}
.hero-video-wrap video{width:100%;height:100%;object-fit:cover}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(12,12,20,0) 40%,rgba(12,12,20,0.95) 100%);pointer-events:none}
.hero-content{position:absolute;bottom:0;left:0;right:0;padding:32px;z-index:2}
.hero-badge{display:inline-block;background:var(--orange);color:#000;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;padding:4px 10px;border-radius:4px;margin-bottom:12px}
.hero-title{font-size:1.5rem;font-weight:700;color:#fff;margin-bottom:6px;max-width:600px}
.hero-meta{display:flex;gap:16px;align-items:center;flex-wrap:wrap}
.hero-rating{display:inline-flex;align-items:center;gap:6px;font-size:2rem;font-weight:800;color:#fff;font-variant-numeric:tabular-nums}
.hero-rating small{font-size:0.7rem;color:var(--text2);font-weight:500;display:block;text-transform:uppercase;letter-spacing:0.5px}
.hero-tags{display:flex;gap:6px;flex-wrap:wrap}
.hero-tag{font-size:11px;padding:3px 10px;border-radius:100px;background:rgba(255,255,255,0.1);color:var(--text2);backdrop-filter:blur(8px)}

/* Ticker bar */
.ticker-bar{background:var(--bg2);border-top:1px solid var(--bg3);border-bottom:1px solid var(--bg3);padding:14px 0;overflow:hidden}
.ticker-inner{display:flex;gap:40px;align-items:center;max-width:1320px;margin:0 auto;padding:0 24px;overflow-x:auto;scrollbar-width:none}
.ticker-inner::-webkit-scrollbar{display:none}
.ticker-stat{display:flex;align-items:baseline;gap:6px;white-space:nowrap}
.ticker-stat .num{font-size:1.15rem;font-weight:800;color:#fff;font-variant-numeric:tabular-nums}
.ticker-stat .lbl{font-size:0.7rem;color:var(--text3);text-transform:uppercase;letter-spacing:1px}
.ticker-sep{width:1px;height:20px;background:var(--bg3);flex-shrink:0}

/* Section labels */
.section-label{font-size:0.7rem;font-weight:800;text-transform:uppercase;letter-spacing:2px;color:var(--text3);margin-bottom:8px}
.section-title{font-size:1.3rem;font-weight:700;color:#fff;margin-bottom:20px}

/* Filter pills */
.filter-section{padding:28px 0 0}
.filter-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;align-items:center}
.filter-row-label{font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);margin-right:8px;min-width:60px}
.pill{display:inline-block;font-size:12px;padding:6px 14px;border-radius:100px;border:1px solid var(--bg3);color:var(--text2);cursor:pointer;transition:all 0.15s;background:transparent;font-family:inherit;user-select:none}
.pill:hover{border-color:var(--text2);color:var(--text)}
.pill.active{background:var(--orange);color:#000;border-color:var(--orange);font-weight:700}
.pill.active-green{background:var(--green);color:#000;border-color:var(--green);font-weight:700}
.pill-count{font-size:10px;color:var(--text3);margin-left:4px}
.filter-summary{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.clip-count-display{font-size:0.85rem;color:var(--text2)}
.clip-count-display strong{color:#fff;font-variant-numeric:tabular-nums}
.reset-btn{background:transparent;border:1px solid var(--bg3);color:var(--text3);font-size:11px;padding:5px 12px;border-radius:6px;cursor:pointer;font-family:inherit;transition:all 0.15s}
.reset-btn:hover{border-color:var(--orange);color:var(--orange)}
.quality-slider-wrap{display:flex;align-items:center;gap:10px}
.quality-slider-wrap input[type=range]{-webkit-appearance:none;height:3px;background:var(--bg3);border:none;border-radius:2px;cursor:pointer;width:120px}
.quality-slider-wrap input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--orange);cursor:pointer}
.quality-val{font-size:12px;color:var(--orange);font-weight:700;font-variant-numeric:tabular-nums;min-width:16px}

/* Clip Grid — Sports Trading Cards */
.clip-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-bottom:48px}
.clip-card{background:var(--bg2);border-radius:10px;overflow:hidden;cursor:pointer;transition:transform 0.2s,box-shadow 0.2s;position:relative}
.clip-card:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,0.5)}
.clip-thumb{position:relative;aspect-ratio:16/9;overflow:hidden;background:#000}
.clip-thumb img{width:100%;height:100%;object-fit:cover;transition:transform 0.3s}
.clip-card:hover .clip-thumb img{transform:scale(1.06)}
.clip-rating{position:absolute;top:10px;right:10px;width:42px;height:42px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:800;font-variant-numeric:tabular-nums;z-index:2}
.clip-rating.high{background:rgba(0,230,118,0.9);color:#000}
.clip-rating.mid{background:rgba(255,193,7,0.9);color:#000}
.clip-rating.low{background:rgba(231,76,60,0.9);color:#fff}
.clip-arc-tag{position:absolute;top:10px;left:10px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:3px 8px;border-radius:4px;background:rgba(0,0,0,0.7);color:var(--text2);backdrop-filter:blur(6px);z-index:2}
/* Hover overlay */
.clip-hover-overlay{position:absolute;inset:0;background:linear-gradient(0deg,rgba(12,12,20,0.95) 0%,rgba(12,12,20,0.6) 50%,rgba(12,12,20,0) 100%);opacity:0;transition:opacity 0.25s;display:flex;flex-direction:column;justify-content:flex-end;padding:14px;z-index:3}
.clip-card:hover .clip-hover-overlay{opacity:1}
.hover-stat-row{display:flex;gap:12px;margin-bottom:6px}
.hover-stat{font-size:11px;color:var(--text2)}
.hover-stat strong{color:#fff;font-weight:700}
.hover-play{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(--orange)}
.hover-play-icon{width:24px;height:24px;border-radius:50%;background:var(--orange);display:flex;align-items:center;justify-content:center}
.hover-play-icon::after{content:'';border-left:8px solid #000;border-top:5px solid transparent;border-bottom:5px solid transparent;margin-left:2px}
.clip-body{padding:12px 14px 14px}
.clip-title{font-size:0.82rem;color:var(--text);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:8px}
.clip-badges{display:flex;gap:4px;flex-wrap:wrap}
.clip-badge{font-size:10px;padding:2px 7px;border-radius:4px;background:var(--bg3);color:var(--text3)}

/* Charts section */
.charts-section{padding:48px 0;border-top:1px solid var(--bg3)}
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:24px}
.chart-card{background:var(--bg2);border-radius:10px;padding:24px}
.chart-card h3{font-size:0.7rem;font-weight:800;text-transform:uppercase;letter-spacing:2px;color:var(--text3);margin-bottom:16px}
.chart-wrap{position:relative;max-height:320px;display:flex;justify-content:center}

/* Brand pills */
.brand-section{padding:0 0 48px}
.brand-pills{display:flex;flex-wrap:wrap;gap:8px}
.brand-pill{display:inline-flex;align-items:center;gap:6px;font-size:12px;padding:6px 14px;border-radius:100px;border:1px solid var(--bg3);color:var(--text2);cursor:pointer;transition:all 0.15s;background:transparent}
.brand-pill:hover{border-color:var(--text2);color:var(--text)}
.brand-pill.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.brand-pill .brand-count{font-size:10px;background:var(--bg3);color:var(--text3);padding:1px 6px;border-radius:100px}
.brand-pill.active .brand-count{background:rgba(255,255,255,0.2);color:rgba(255,255,255,0.8)}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:1000;display:none;align-items:center;justify-content:center;padding:24px;backdrop-filter:blur(4px)}
.modal-overlay.show{display:flex}
.modal{background:var(--bg2);border-radius:12px;max-width:960px;width:100%;max-height:90vh;overflow-y:auto;position:relative}
.modal-close{position:absolute;top:12px;right:12px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.1);border:none;color:#fff;font-size:18px;cursor:pointer;z-index:10;display:flex;align-items:center;justify-content:center;transition:background 0.15s}
.modal-close:hover{background:rgba(255,255,255,0.2)}
.modal-video{width:100%;aspect-ratio:16/9;background:#000;border-radius:12px 12px 0 0}
.modal-video video{width:100%;height:100%;border-radius:12px 12px 0 0}
.modal-body{padding:24px}
.modal-title{font-size:1.1rem;font-weight:700;color:#fff;margin-bottom:12px}
.modal-stats{display:flex;gap:20px;margin-bottom:20px;flex-wrap:wrap}
.modal-stat{text-align:center}
.modal-stat .val{font-size:1.5rem;font-weight:800;color:#fff;font-variant-numeric:tabular-nums}
.modal-stat .lbl{font-size:0.65rem;text-transform:uppercase;letter-spacing:1px;color:var(--text3)}
.modal-commentary{margin-bottom:20px}
.modal-commentary-tabs{display:flex;gap:0;margin-bottom:0;border-bottom:2px solid var(--bg3)}
.commentary-tab{padding:8px 16px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all 0.15s;background:transparent;border-left:none;border-right:none;border-top:none;font-family:inherit}
.commentary-tab:hover{color:var(--text)}
.commentary-tab.active{color:var(--orange);border-bottom-color:var(--orange)}
.commentary-text{padding:16px 0;font-size:0.9rem;color:var(--text2);line-height:1.7;min-height:60px}
.modal-skills{margin-bottom:16px}
.modal-skills h4{font-size:0.7rem;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);margin-bottom:12px}
.skill-bars{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.skill-bar{display:flex;align-items:center;gap:8px}
.skill-bar .skill-name{font-size:11px;color:var(--text2);min-width:80px;text-transform:capitalize}
.skill-bar .bar-track{flex:1;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.skill-bar .bar-fill{height:100%;border-radius:2px;transition:width 0.4s ease}
.skill-bar .skill-val{font-size:11px;font-weight:700;color:#fff;min-width:18px;text-align:right;font-variant-numeric:tabular-nums}

/* Footer */
.footer{padding:32px 0;border-top:1px solid var(--bg3);text-align:center;color:var(--text3);font-size:0.75rem}
.footer strong{color:var(--text2)}

/* Court texture background */
.court-texture{position:relative}
.court-texture::before{content:'';position:absolute;top:0;left:0;right:0;height:400px;background:repeating-linear-gradient(90deg,transparent,transparent 79px,rgba(255,255,255,0.015) 79px,rgba(255,255,255,0.015) 80px),repeating-linear-gradient(0deg,transparent,transparent 79px,rgba(255,255,255,0.015) 79px,rgba(255,255,255,0.015) 80px);pointer-events:none;z-index:0}

/* Responsive */
@media(max-width:900px){
  .clip-grid{grid-template-columns:repeat(2,1fr);gap:14px}
  .charts-grid{grid-template-columns:1fr}
  .hero-video-wrap{aspect-ratio:16/9}
  .hero-title{font-size:1.2rem}
  .hero-rating{font-size:1.5rem}
}
@media(max-width:600px){
  .clip-grid{grid-template-columns:1fr;gap:12px}
  .ticker-inner{gap:20px}
  .hero-content{padding:16px}
  .modal{margin:12px}
  .skill-bars{grid-template-columns:1fr}
}
</style>
</head>
<body class="court-texture">

<!-- HERO -->
<section class="hero">
  <div class="hero-inner">
    <div class="hero-video-wrap" id="heroWrap">
      <video id="heroVideo" muted loop playsinline autoplay></video>
      <div class="hero-overlay"></div>
      <div class="hero-content" id="heroContent"></div>
    </div>
  </div>
</section>

<!-- TICKER BAR -->
<div class="ticker-bar">
  <div class="ticker-inner" id="tickerBar"></div>
</div>

<!-- FILTERS + GRID -->
<main class="container">
  <section class="filter-section">
    <div class="section-label">FILTERS</div>
    <div id="arcFilters" class="filter-row"><span class="filter-row-label">ARC</span></div>
    <div id="shotFilters" class="filter-row"><span class="filter-row-label">SHOT</span></div>
    <div id="brandFilters" class="filter-row"><span class="filter-row-label">BRAND</span></div>
    <div class="filter-row">
      <span class="filter-row-label">QUALITY</span>

      </div>
    </div>
    <div class="filter-summary">
      <span class="clip-count-display">Showing <strong id="clipCount">0</strong> clips</span>
      <button class="reset-btn" onclick="resetFilters()">Reset All</button>
    </div>
  </section>

  <!-- CLIP GRID -->
  <section id="clipGrid" class="clip-grid"></section>

  <!-- CHARTS -->
  <section class="charts-section">
    <div class="section-label">ANALYTICS</div>
    <div class="section-title">Corpus Intelligence</div>
    <div class="charts-grid">
      <div class="chart-card">
        <h3>Skill Distribution (Avg)</h3>
        <div class="chart-wrap"><canvas id="radarChart"></canvas></div>
      </div>
      <div class="chart-card">
        <h3>Shot Type Breakdown</h3>
        <div class="chart-wrap"><canvas id="donutChart"></canvas></div>
      </div>
    </div>
  </section>
</main>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <div class="modal-video"><video id="modalVideo" controls></video></div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<!-- FOOTER -->
<div class="footer container">
  <strong>Pickle DaaS</strong> &mdash; Visual Intelligence Explorer &mdash; 74 clips analyzed by Gemini 2.5 Flash
</div>

ese young players, the focus is on fundamental skating and puck control in challenging conditions. Encouraging active movement and stick on the ice is key at this stage.","hype":"The future stars are out tonight, battling the elements and each other on the frozen pond! Every stride, every stick-handle, a testament to their passion for the game!","skills":{"court_coverage":0,"kitchen":0,"power":0,"touch":0,"athleticism":5,"creativity":0,"court_iq":0,"consistency":0,"composure":0},"model":"gemini-2.5-flash","signature_move":null,"play_style":null}];

const allArcs = [...new Set(CORPUS.map(c=>c.arc).filter(Boolean))].sort();
const allShots = [...new Set(CORPUS.map(c=>c.dominant_shot).filter(Boolean))].sort();
const brandMap = {};
CORPUS.forEach(c=>(c.brands||[]).forEach(b=>{const k=b.toLowerCase();brandMap[k]=brandMap[k]||{name:b,count:0};brandMap[k].count++}));
const allBrands = Object.values(brandMap).sort((a,b)=>b.count-a.count);

let activeArc=null, activeShot=null, activeBrand=null, minQuality=1;

// --- HERO ---
function initHero(){
  // Pick the highest viral+quality clip as featured
  const best = [...CORPUS].sort((a,b)=>(b.viral+b.quality+b.watchability)-(a.viral+a.quality+a.watchability))[0];
  const v = document.getElementById('heroVideo');
  v.src = best.video_url;
  v.poster = best.thumbnail;
  const c = document.getElementById('heroContent');
  const arcLabel = (best.arc||'').replace(/_/g,' ');
  c.innerHTML = `
    <div class="hero-badge">${arcLabel}</div>
    <div class="hero-title">${best.summary||'Featured Highlight'}</div>
    <div class="hero-meta">
      <div class="hero-rating">${best.quality}<small>/10 Quality</small></div>
      <div class="hero-rating" style="color:var(--orange)">${best.viral}<small>/10 Viral</small></div>
      <div class="hero-tags">
        ${(best.badges||[]).slice(0,3).map(b=>`<span class="hero-tag">${b}</span>`).join('')}
      </div>
    </div>`;
}

// --- TICKER ---
function initTicker(){
  const totalShots = CORPUS.reduce((s,c)=>s+(c.total_shots||0),0);
  const avgQ = (CORPUS.reduce((s,c)=>s+c.quality,0)/CORPUS.length).toFixed(1);
  const avgV = (CORPUS.reduce((s,c)=>s+c.viral,0)/CORPUS.length).toFixed(1);
  const topShot = allShots.reduce((a,b)=>CORPUS.filter(c=>c.dominant_shot===a).length>=CORPUS.filter(c=>c.dominant_shot===b).length?a:b);
  const brandsCount = allBrands.length;
  document.getElementById('tickerBar').innerHTML = `
    <div class="ticker-stat"><span class="num">${CORPUS.length}</span><span class="lbl">Clips</span></div><div class="ticker-sep"></div>
    <div class="ticker-stat"><span class="num">${totalShots}</span><span class="lbl">Total Shots</span></div><div class="ticker-sep"></div>
    <div class="ticker-stat"><span class="num">${avgQ}</span><span class="lbl">Avg Quality</span></div><div class="ticker-sep"></div>
    <div class="ticker-stat"><span class="num">${avgV}</span><span class="lbl">Avg Viral</span></div><div class="ticker-sep"></div>
    <div class="ticker-stat"><span class="num">${topShot.replace(/_/g,' ')}</span><span class="lbl">Top Shot</span></div><div class="ticker-sep"></div>
    <div class="ticker-stat"><span class="num">${brandsCount}</span><span class="lbl">Brands Detected</span></div><div class="ticker-sep"></div>
    <div class="ticker-stat"><span class="num">${allArcs.length}</span><span class="lbl">Story Arcs</span></div>`;
}

// --- FILTERS ---
function buildFilters(){
  const arcRow = document.getElementById('arcFilters');
  const shotRow = document.getElementById('shotFilters');
  const brandRow = document.getElementById('brandFilters');
  allArcs.forEach(a=>{
    const count = CORPUS.filter(c=>c.arc===a).length;
    const btn = document.createElement('button');
    btn.className = 'pill';
    btn.innerHTML = a.replace(/_/g,' ')+'<span class="pill-count">'+count+'</span>';
    btn.onclick = ()=>{activeArc=activeArc===a?null:a;updateFilterUI();renderGrid()};
    btn.dataset.val = a;
    arcRow.appendChild(btn);
  });
  allShots.forEach(s=>{
    const count = CORPUS.filter(c=>c.dominant_shot===s).length;
    const btn = document.createElement('button');
    btn.className = 'pill';
    btn.innerHTML = (s||'other').replace(/_/g,' ')+'<span class="pill-count">'+count+'</span>';
    btn.onclick = ()=>{activeShot=activeShot===s?null:s;updateFilterUI();renderGrid()};
    btn.dataset.val = s;
    shotRow.appendChild(btn);
  });
  allBrands.forEach(b=>{
    const btn = document.createElement('button');
    btn.className = 'brand-pill';
    btn.innerHTML = b.name+'<span class="brand-count">'+b.count+'</span>';
    btn.onclick = ()=>{activeBrand=activeBrand===b.name?null:b.name;updateFilterUI();renderGrid()};
    btn.dataset.val = b.name;
    brandRow.appendChild(btn);
  });
  document.getElementById('qualSlider').oninput = function(){
    minQuality=+this.value;
    document.getElementById('qualVal').textContent=this.value;
    renderGrid();
  };
}
function updateFilterUI(){
  document.querySelectorAll('#arcFilters .pill').forEach(p=>p.classList.toggle('active',p.dataset.val===activeArc));
  document.querySelectorAll('#shotFilters .pill').forEach(p=>p.classList.toggle('active',p.dataset.val===activeShot));
  document.querySelectorAll('#brandFilters .brand-pill').forEach(p=>p.classList.toggle('active',p.dataset.val===activeBrand));
}
function resetFilters(){
  activeArc=null;activeShot=null;activeBrand=null;minQuality=1;
  document.getElementById('qualSlider').value=1;
  document.getElementById('qualVal').textContent='1';
  updateFilterUI();renderGrid();
}
function getFiltered(){
  return CORPUS.filter(c=>{
    if(activeArc && c.arc!==activeArc) return false;
    if(activeShot && c.dominant_shot!==activeShot) return false;
    if(activeBrand && !(c.brands||[]).some(b=>b.toLowerCase()===activeBrand.toLowerCase())) return false;
    if(c.quality < minQuality) return false;
    return true;
  });
}

// --- GRID ---
function renderGrid(){
  const filtered = getFiltered();
  document.getElementById('clipCount').textContent = filtered.length;
  const grid = document.getElementById('clipGrid');
  grid.innerHTML = filtered.map((c,i)=>{
    const ratingClass = c.quality>=8?'high':c.quality>=6?'mid':'low';
    const arcLabel = (c.arc||'').replace(/_/g,' ');
    const badges = (c.badges||[]).slice(0,3);
    return `<div class="clip-card" onclick="openModal(${CORPUS.indexOf(c)})">
      <div class="clip-thumb">
        <img src="${c.thumbnail}" alt="" loading="lazy">
        <div class="clip-rating ${ratingClass}">${c.quality}</div>
        <div class="clip-arc-tag">${arcLabel}</div>
        <div class="clip-hover-overlay">
          <div class="hover-stat-row">
            <span class="hover-stat">Viral <strong>${c.viral}/10</strong></span>
            <span class="hover-stat">Shots <strong>${c.total_shots}</strong></span>
            <span class="hover-stat">${(c.dominant_shot||'').replace(/_/g,' ')}</span>
          </div>
          <div class="hover-play"><span class="hover-play-icon"></span> Watch Clip</div>
        </div>
      </div>
      <div class="clip-body">
        <div class="clip-title">${c.summary||'Highlight clip'}</div>
        <div class="clip-badges">${badges.map(b=>`<span class="clip-badge">${b}</span>`).join('')}</div>
      </div>
    </div>`;
  }).join('');
}

// --- MODAL ---
function openModal(idx){
  const c = CORPUS[idx];
  document.getElementById('modalOverlay').classList.add('show');
  const v = document.getElementById('modalVideo');
  v.src = c.video_url;
  v.poster = c.thumbnail;
  document.body.style.overflow='hidden';

  const commentaryTypes = [
    {key:'espn',label:'ESPN'},
    {key:'hype',label:'Hype'},
    {key:'ron_burgundy',label:'Ron Burgundy'},
    {key:'coaching',label:'Coaching'},
    {key:'social_caption',label:'Social'}
  ];
  const skills = c.skills||{};
  const skillKeys = Object.keys(skills).filter(k=>skills[k]>0);

  document.getElementById('modalBody').innerHTML = `
    <div class="modal-title">${c.summary||'Highlight Clip'}</div>
    <div class="modal-stats">
      <div class="modal-stat"><div class="val">${c.quality}</div><div class="lbl">Quality</div></div>
      <div class="modal-stat"><div class="val" style="color:var(--orange)">${c.viral}</div><div class="lbl">Viral</div></div>
      <div class="modal-stat"><div class="val">${c.watchability}</div><div class="lbl">Watch</div></div>
      <div class="modal-stat"><div class="val">${c.total_shots}</div><div class="lbl">Shots</div></div>
      <div class="modal-stat"><div class="val" style="text-transform:capitalize">${(c.dominant_shot||'').replace(/_/g,' ')}</div><div class="lbl">Dom. Shot</div></div>
      <div class="modal-stat"><div class="val" style="text-transform:capitalize">${(c.play_style||'')}</div><div class="lbl">Style</div></div>
    </div>
    ${c.signature_move?`<div style="margin-bottom:16px;font-size:0.85rem;color:var(--text2)"><strong style="color:var(--orange)">Signature Move:</strong> ${c.signature_move}</div>`:''}
    <div class="modal-commentary">
      <div class="modal-commentary-tabs" id="commentaryTabs">
        ${commentaryTypes.map((t,i)=>`<button class="commentary-tab${i===0?' active':''}" onclick="switchTab(this,'${t.key}',${idx})">${t.label}</button>`).join('')}
      </div>
      <div class="commentary-text" id="commentaryText">${c.espn||c.summary||''}</div>
    </div>
    <div class="modal-skills">
      <h4>Skill Ratings</h4>
      <div class="skill-bars">
        ${skillKeys.map(k=>{
          const val = skills[k];
          const color = val>=8?'var(--green)':val>=6?'var(--orange)':'var(--red)';
          return `<div class="skill-bar">
            <span class="skill-name">${k.replace(/_/g,' ')}</span>
            <div class="bar-track"><div class="bar-fill" style="width:${val*10}%;background:${color}"></div></div>
            <span class="skill-val">${val}</span>
          </div>`;
        }).join('')}
      </div>
    </div>
    ${(c.badges||[]).length?`<div style="margin-top:12px"><span style="font-size:0.7rem;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3)">Badges</span><div style="margin-top:6px;display:flex;gap:6px;flex-wrap:wrap">${(c.badges||[]).map(b=>`<span style="font-size:11px;padding:4px 10px;border-radius:100px;background:var(--bg3);color:var(--text2)">${b}</span>`).join('')}</div></div>`:''}
    ${(c.brands||[]).length?`<div style="margin-top:12px"><span style="font-size:0.7rem;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3)">Brands Detected</span><div style="margin-top:6px;display:flex;gap:6px;flex-wrap:wrap">${(c.brands||[]).map(b=>`<span style="font-size:11px;padding:4px 10px;border-radius:100px;border:1px solid var(--bg3);color:var(--text2)">${b}</span>`).join('')}</div></div>`:''}
  `;
}
function switchTab(el,key,idx){
  document.querySelectorAll('#commentaryTabs .commentary-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  const c = CORPUS[idx];
  document.getElementById('commentaryText').textContent = c[key]||c.summary||'';
}
function closeModal(){
  document.getElementById('modalOverlay').classList.remove('show');
  document.getElementById('modalVideo').pause();
  document.getElementById('modalVideo').src='';
  document.body.style.overflow='';
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});

// --- CHARTS ---
function initCharts(){
  const skillNames = ['court_coverage','kitchen','power','touch','athleticism','creativity','court_iq','consistency','composure'];
  const avgs = skillNames.map(k=>{
    const vals = CORPUS.map(c=>(c.skills||{})[k]||0).filter(v=>v>0);
    return vals.length?(vals.reduce((a,b)=>a+b,0)/vals.length):0;
  });
  new Chart(document.getElementById('radarChart'),{
    type:'radar',
    data:{
      labels:skillNames.map(s=>s.replace(/_/g,' ')),
      datasets:[{
        label:'Avg Skill',
        data:avgs.map(v=>+v.toFixed(1)),
        borderColor:'#FF8B3D',
        backgroundColor:'rgba(255,139,61,0.15)',
        pointBackgroundColor:'#FF8B3D',
        pointBorderColor:'#FF8B3D',
        borderWidth:2,
        pointRadius:3
      }]
    },
    options:{
      responsive:true,maintainAspectRatio:true,
      scales:{r:{beginAtZero:true,max:10,ticks:{stepSize:2,color:'#6B665F',backdropColor:'transparent',font:{size:10}},grid:{color:'rgba(255,255,255,0.06)'},pointLabels:{color:'#A09B94',font:{size:11}}}},
      plugins:{legend:{display:false}}
    }
  });

  const shotCounts = {};
  CORPUS.forEach(c=>{const s=c.dominant_shot||'other';shotCounts[s]=(shotCounts[s]||0)+1});
  const sortedShots = Object.entries(shotCounts).sort((a,b)=>b[1]-a[1]);
  const colors = ['#FF8B3D','#00E676','#3D8BFF','#9B59B6','#E74C3C','#FFC107','#00BCD4','#FF5722','#8BC34A'];
  new Chart(document.getElementById('donutChart'),{
    type:'doughnut',
    data:{
      labels:sortedShots.map(s=>s[0].replace(/_/g,' ')),
      datasets:[{data:sortedShots.map(s=>s[1]),backgroundColor:colors.slice(0,sortedShots.length),borderWidth:0,borderRadius:2}]
    },
    options:{
      responsive:true,maintainAspectRatio:true,cutout:'65%',
      plugins:{legend:{position:'right',labels:{color:'#A09B94',padding:12,font:{size:11},usePointStyle:true,pointStyle:'circle'}}}
    }
  });
}

// --- INIT ---
initHero();
initTicker();
buildFilters();
renderGrid();
initCharts();
</script>
</body>
</html>
